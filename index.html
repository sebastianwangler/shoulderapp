<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>ShoulderApp</title>
  <style>
    html, body {
      touch-action: manipulation;
    }
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.8em;
      font-weight: 600;
      margin: 0 0 8px;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }
    header p {
      color: #666;
      margin: 0;
      font-size: 1em;
    }
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .tool-card:hover, .tool-card:focus {
      border-color: #999;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      outline: none;
    }
    .tool-card:active {
      transform: translateY(0);
    }
    .tool-card .icon-wrap {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tool-card .icon-wrap svg {
      width: 100%;
      height: 100%;
    }
    .tool-card h2 {
      font-size: 1.15em;
      font-weight: 600;
      margin: 0 0 8px;
      color: #1a1a1a;
    }
    .tool-card p {
      font-size: 0.9em;
      color: #666;
      margin: 0;
      line-height: 1.5;
    }
    footer {
      margin-top: 40px;
      padding-top: 20px;
      text-align: center;
      font-size: 0.85em;
      color: #999;
    }
    footer a {
      color: #666;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      body {
        padding: 24px 16px;
      }
      header {
        margin-bottom: 28px;
      }
      header h1 {
        font-size: 1.5em;
      }
      .tool-card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>ShoulderApp</h1>
      <p>Orthopaedic measurement tools</p>
    </header>

    <main class="tools">

      <a href="glenoid.html" class="tool-card">
        <div class="icon-wrap">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="24" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M 13.5 23 A 24 24 0 0 1 50.5 23 L 32 32 Z" fill="#00aaff" fill-opacity="0.35" stroke="#0080cc" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Glenoid Defect Size</h2>
        <p>Measure glenoid bone loss as a percentage of the circular best-fit area.</p>
      </a>

      <a href="wedge.html" class="tool-card">
        <div class="icon-wrap">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <ellipse cx="32" cy="50" rx="22" ry="6" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M 10 50 L 10 30 Q 32 36 54 18 L 54 50 Z" fill="#1D9E75" fill-opacity="0.25" stroke="#0F6E56" stroke-width="2" stroke-linejoin="round"/>
            <path d="M 10 30 Q 32 36 54 18" fill="none" stroke="#0F6E56" stroke-width="2"/>
          </svg>
        </div>
        <h2>Wedge Calculator</h2>
        <p>Compute heights of a cylindrical wedge with two perpendicular tilts.</p>
      </a>

    </main>

    <footer>
      <p>For research and educational use only.</p>
    </footer>

  </div>

</body>
</html>
