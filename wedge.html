<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png" />
<title>ShoulderApp - Wedge Calculator</title>
<style>
  html, body { touch-action: manipulation; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 12px 16px 40px;
    color: #1a1a1a;
    background: #fff;
  }

  /* Force all interactive elements to inherit font from body */
  button, input, select, textarea, label {
    font-family: inherit;
  }

  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    margin: 0 auto 16px;
    padding: 8px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    text-decoration: none;
    transition: border-color 0.2s, background-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .back-link:hover { border-color: #999; background: #fafafa; }
  .back-link:active { transform: translateY(1px); }

  .copyright-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.75em;
    color: #999;
  }

  h1 { font-size: 1.5em; margin: 8px 0 8px; }

  .lead {
    font-size: 0.95em;
    color: #555;
    margin: 0 auto 12px;
    max-width: 560px;
  }

  .side-display {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background: #fff;
    font-size: 14px;
    color: #1a1a1a;
  }
  .btn-link {
    background: none;
    border: none;
    color: #378ADD;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
  }
  .btn-link:hover { text-decoration: underline; }

  .wedge-app {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: left;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
  }
  .controls-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .controls-bottom {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  @media (max-width: 560px) {
    .controls-top { grid-template-columns: 1fr; }
  }

  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label { font-size: 12px; color: #555; font-weight: 600; }
  .control input {
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background: #fff;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
  }
  .control input:focus {
    outline: none;
    border-color: #378ADD;
    box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.18);
  }

  .id-row {
    display: flex;
    gap: 8px;
  }
  .id-row input {
    flex: 1;
    min-width: 0;
  }
  .reset-btn {
    padding: 9px 14px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background: #fff;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { background: #f0f0f0; border-color: #999; }

  .side-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .side-row .side-display {
    flex: 1;
    min-width: 0;
  }

  /* Default (desktop) — Reset sits next to Side; the in-row one near the input is hidden */
  .reset-mobile { display: none; }
  .reset-desktop { display: inline-flex; }

  /* Mobile — Reset goes back next to the Patient ID input */
  @media (max-width: 560px) {
    .reset-mobile { display: inline-flex; }
    .reset-desktop { display: none; }
  }

  .diagram-wrap {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px;
  }

  .diagram-wrap svg { display: block; width: 100%; height: auto; }

  .summary {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 14px 16px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
  }

  .summary > div { display: flex; flex-direction: column; gap: 2px; }

  .summary .k {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .summary .v {
    font-size: 15px;
    color: #1a1a1a;
    font-weight: 600;
  }

  .actions-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 11px 22px;
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.15s, opacity 0.15s;
  }

  .btn-primary { background: #1a1a1a; color: white; border: none; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }

  .btn-secondary {
    background: #f0f0f0;
    color: #1a1a1a;
    border: 1px solid #ccc;
  }
  .btn-secondary:hover { background: #e0e0e0; }

  .viewer-3d {
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 14px 14px 14px;
  }

  .viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .viewer-header h2 {
    font-size: 0.95em;
    font-weight: 600;
    margin: 0;
    color: #1a1a1a;
  }

  .viewer-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

  #three-container {
    width: 100%;
    height: 400px;
    position: relative;
    touch-action: none;
    overflow: hidden;
  }
  #three-container canvas { display: block; }

  .viewer-hint {
    font-size: 11px;
    color: #888;
    text-align: center;
    margin: 8px 0 0;
  }

  .viewer-fallback {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  .three-label {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,0.92);
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
    transform: translateY(-100%);
  }

  .footer-note {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-top: 4px;
    line-height: 1.5;
  }

  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  text.t  { font-size: 14px; fill: #1a1a1a; }
  text.ts { font-size: 12px; fill: #555; }
  text.th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }

  /* Anatomy labels (set automatically by side selection) */

  /* Side selection modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-content {
    background: white;
    padding: 28px 24px;
    border-radius: 8px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }
  .modal-content h2 { margin: 0 0 8px; font-size: 1.25em; font-weight: normal; }
  .modal-content p { margin: 0 0 20px; color: #555; font-size: 0.95em; }
  .modal-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .modal-btn { min-width: 140px; }

  @media (max-width: 600px) {
    h1 { font-size: 1.25em; }
    .controls, .summary { padding: 12px; }
    #three-container { height: 320px; }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "./lib/three/build/three.module.js",
    "three/addons/": "./lib/three/examples/jsm/"
  }
}
</script>

<body>

<div style="display: flex; gap: 8px; justify-content: center; margin: 0 auto 16px;">
  <a href="index.html" class="back-link" style="margin: 0;">← menu</a>
  <button type="button" data-reset class="back-link" style="margin: 0; border: 1px solid #ddd;">Reset</button>
</div>

<h1>ShoulderApp - Wedge Calculator</h1>
<p class="lead" style="display:none;"></p>

<div class="wedge-app">

  <div class="controls">
    <div class="controls-top">
      <div class="control">
        <label for="pat-id">Patient ID</label>
        <div class="id-row">
          <input type="text" id="pat-id" placeholder="optional" maxlength="22" pattern="[A-Za-z0-9\-\.\s]*">
        </div>
      </div>
      <div class="control">
        <label>Side</label>
        <div class="side-row">
          <div class="side-display">
            <span id="side-indicator-text">Right shoulder</span>
            <button type="button" id="change-side-link" class="btn-link">Change</button>
          </div>
        </div>
      </div>
    </div>
    <div class="controls-bottom">
      <div class="control">
        <label for="d-in">Diameter D (mm)</label>
        <input type="number" id="d-in" value="27" step="0.1" min="1" max="500">
      </div>
      <div class="control">
        <label for="a1-in">Sup/Inf - angle (°)</label>
        <input type="number" id="a1-in" value="10" step="0.5" min="-80" max="80">
      </div>
      <div class="control">
        <label for="h1-in">Inf height (mm)</label>
        <input type="number" id="h1-in" value="2" step="0.1" min="0">
      </div>
      <div class="control">
        <label for="a2-in">Ant/Post - angle (°)</label>
        <input type="number" id="a2-in" value="8" step="0.5" min="-80" max="80">
      </div>
    </div>
  </div>

  <div class="diagram-wrap">
    <svg viewBox="0 0 680 460" role="img" aria-labelledby="svg-title svg-desc">
      <title id="svg-title">Cylindrical wedge with two perpendicular tilts</title>
      <desc id="svg-desc">Top view of the cylinder with anatomical labels at the four cardinal points and the resulting slope line, plus two cross-section profiles.</desc>

      <text class="th" x="180" y="28" text-anchor="middle">Top view</text>
      <text id="lbl-d" class="ts" x="180" y="46" text-anchor="middle">Ø 27.70 mm</text>

      <!-- Circle outline -->
      <circle cx="180" cy="230" r="100" fill="none" stroke="#888" stroke-width="1"/>

      <!-- Axes (dotted, colored, within circle) -->
      <line x1="80" y1="230" x2="280" y2="230" stroke="#0F6E56" stroke-width="2" stroke-dasharray="1 4" stroke-linecap="round" opacity="0.85"/>
      <line x1="180" y1="130" x2="180" y2="330" stroke="#185FA5" stroke-width="2" stroke-dasharray="1 4" stroke-linecap="round" opacity="0.85"/>

      <!-- Resulting slope line (dynamic) -->
      <g id="result-slope-line"></g>

      <!-- Center marker -->
      <circle cx="180" cy="230" r="2.5" fill="#555"/>
      <text id="lbl-c" class="ts" x="190" y="226" text-anchor="start">Center 6.50 mm</text>

      <!-- "sup" label and top marker -->
      <text class="ts" x="180" y="100" text-anchor="middle" fill="#185FA5">sup</text>
      <circle cx="180" cy="130" r="3.5" fill="#185FA5"/>
      <text id="lbl-n" class="th" x="180" y="124" text-anchor="middle" fill="#185FA5">11.00</text>

      <!-- bottom marker and "inf" label -->
      <circle cx="180" cy="330" r="3.5" fill="#185FA5"/>
      <text id="lbl-s" class="th" x="180" y="346" text-anchor="middle" fill="#185FA5">2.00</text>
      <text class="ts" x="180" y="372" text-anchor="middle" fill="#185FA5">inf</text>

      <!-- Left/right markers -->
      <circle cx="80" cy="230" r="3.5" fill="#0F6E56"/>
      <text id="lbl-w" class="th" x="74" y="234" text-anchor="end" fill="#0F6E56">4.06</text>
      <circle cx="280" cy="230" r="3.5" fill="#0F6E56"/>
      <text id="lbl-e" class="th" x="286" y="234" text-anchor="start" fill="#0F6E56">8.94</text>

      <!-- Anatomy labels (auto-set by side selection) -->
      <text id="anat-label-left" class="ts" x="24" y="234" text-anchor="middle" fill="#0F6E56">post</text>
      <text id="anat-label-right" class="ts" x="336" y="234" text-anchor="middle" fill="#0F6E56">ant</text>

      <!-- Resulting slope label (two lines) -->
      <text class="ts" x="180" y="395" text-anchor="middle" fill="#555">Resulting slope:</text>
      <text id="lbl-result" class="th" x="180" y="415" text-anchor="middle" fill="#000">20.29° at 12:57</text>

      <!-- Section views (right half) -->
      <text id="section1-header" class="th" x="510" y="20" text-anchor="middle">Section - sup/inf (18°)</text>
      <g id="side-view-1"></g>

      <text id="section2-header" class="th" x="510" y="325" text-anchor="middle">Section - ant/post (10°)</text>
      <g id="side-view-2"></g>
    </svg>
  </div>

  <div class="summary" id="sum"></div>

  <div class="actions-row">
    <button class="btn btn-primary" id="download-pdf">Download PDF</button>
  </div>


  <div class="viewer-3d">
    <div class="viewer-header">
      <h2>3D view</h2>
      <div class="viewer-buttons">
        <button class="btn btn-secondary" id="toggle-wedge-btn" style="padding: 7px 14px; font-size: 12px; background: #87CEEB; color: #333; border-color: #87CEEB;">Wedge</button>
        <label style="font-size: 11px; color: #555; display: flex; align-items: center; gap: 4px;">K-wire Ø <input type="number" id="hole-dia-in" value="3.4" step="0.1" min="0" max="10" style="width: 50px; padding: 4px 6px; font-size: 11px; border: 1px solid #ccc; border-radius: 4px;"> mm</label>
        <button class="btn btn-secondary" id="toggle-guide-a-btn" style="padding: 7px 14px; font-size: 12px;">Guide A</button>
        <button class="btn btn-secondary" id="toggle-guide-b-btn" style="padding: 7px 14px; font-size: 12px;">Guide B</button>
        <button class="btn btn-secondary" id="recenter-btn" style="padding: 7px 14px; font-size: 12px;">Recenter</button>
      </div>
    </div>
    <div id="three-container">
      <div class="viewer-fallback">Loading 3D view…</div>
    </div>
    <p class="viewer-hint">Drag to rotate · pinch or scroll to zoom</p>
    <div class="actions-row" style="margin-top: 10px;">
      <label style="font-size: 11px; display: flex; align-items: center; gap: 4px;">
        <input type="checkbox" id="chk-supports"> Supports
      </label>
      <button class="btn btn-primary" id="download-all-stl" style="padding: 7px 14px; font-size: 12px;">Download .stl</button>
    </div>
  </div>

  <p class="footer-note">All heights in mm. Center = average of the four edge heights.<br>Resulting slope = steepest tilt of the top surface (combining both axes).</p>

</div>

<!-- Side selection modal -->
<div id="side-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-buttons">
      <button class="btn btn-primary modal-btn" data-side="left">Left</button>
      <button class="btn btn-primary modal-btn" data-side="right">Right</button>
    </div>
  </div>
</div>

<script src="./lib/jspdf.umd.min.js"></script>

<script>
(function () {
  function $(id) { return document.getElementById(id); }
  function clamp(v, lo, hi) { return isNaN(v) ? lo : Math.max(lo, Math.min(hi, v)); }
  function f(n) { return n.toFixed(1); }
  function setText(id, txt) { var el = $(id); if (el) el.textContent = txt; }

  // Format clock position using standard clock-face convention:
  //   12 at top (vertical up), 3 on the right, 6 at bottom, 9 on the left.
  // dirRad is the math-angle (from +x toward +y) of the upper endpoint of the slope line.
  function formatClockPosition(dirRad) {
    var mathAngleDeg = dirRad * 180 / Math.PI;
    var clockAngleDeg = 90 - mathAngleDeg;
    while (clockAngleDeg < 0) clockAngleDeg += 360;
    while (clockAngleDeg >= 360) clockAngleDeg -= 360;
    var totalHours = (clockAngleDeg / 360) * 12;
    var hours = Math.floor(totalHours);
    var minutes = Math.round((totalHours - hours) * 60);
    if (minutes === 60) { minutes = 0; hours++; }
    if (hours === 0) hours = 12;
    if (hours > 12) hours -= 12;
    return hours + ':' + (minutes < 10 ? '0' + minutes : minutes);
  }

  function drawSide(groupId, D, hLeft, hRight, cx, cy, color, leftLabel, rightLabel, fixedScale) {
    var g = $(groupId);
    var maxW = 200, maxH = 80;
    var maxHeight = Math.max(hLeft, hRight, 0.5);
    var scale = fixedScale || Math.min(maxW / D, maxH / maxHeight);
    var wPx = D * scale;
    var hLeftPx = Math.max(hLeft * scale, 1);
    var hRightPx = Math.max(hRight * scale, 1);
    var x0 = cx - wPx / 2;
    var x1 = cx + wPx / 2;
    var yBase = cy + 30;
    // Flat bottom (floor) at yBase; angled top peaks where the wedge is thickest.
    var yTL = yBase - hLeftPx;
    var yTR = yBase - hRightPx;

    var html =
      '<polygon points="' + f(x0) + ',' + f(yBase) + ' ' + f(x1) + ',' + f(yBase) + ' ' + f(x1) + ',' + f(yTR) + ' ' + f(x0) + ',' + f(yTL) + '" fill="' + color + '" fill-opacity="0.14" stroke="' + color + '" stroke-width="1"/>' +
      '<line x1="' + f(x0) + '" y1="' + f(yBase) + '" x2="' + f(x0) + '" y2="' + f(yTL) + '" stroke="' + color + '" stroke-width="0.5" opacity="0.7"/>' +
      '<line x1="' + f(x1) + '" y1="' + f(yBase) + '" x2="' + f(x1) + '" y2="' + f(yTR) + '" stroke="' + color + '" stroke-width="0.5" opacity="0.7"/>' +
      '<text class="ts" x="' + f(x0 - 6) + '" y="' + f((yBase + yTL) / 2 + 4) + '" text-anchor="end" fill="' + color + '">' + hLeft.toFixed(2) + ' mm</text>' +
      '<text class="ts" x="' + f(x1 + 6) + '" y="' + f((yBase + yTR) / 2 + 4) + '" text-anchor="start" fill="' + color + '">' + hRight.toFixed(2) + ' mm</text>';

    if (leftLabel) {
      html += '<text class="ts" x="' + f(x0) + '" y="' + f(yBase + 22) + '" text-anchor="middle" fill="' + color + '" font-weight="600">' + leftLabel + '</text>';
    }
    if (rightLabel) {
      html += '<text class="ts" x="' + f(x1) + '" y="' + f(yBase + 22) + '" text-anchor="middle" fill="' + color + '" font-weight="600">' + rightLabel + '</text>';
    }

    g.innerHTML = html;
  }

  function drawSideVertical(groupId, D, hSup, hInf, cx, cy, color, flatOnRight, fixedScale) {
    var g = $(groupId);
    var maxH = 200;
    var maxW = 60;
    var maxHeight = Math.max(hSup, hInf, 0.5);
    var scale = fixedScale || Math.min(maxH / D, maxW / maxHeight);
    var dPx = D * scale;
    var hSupPx = Math.max(hSup * scale, 1);
    var hInfPx = Math.max(hInf * scale, 1);
    var maxHpx = maxHeight * scale;
    var yTop = cy - dPx / 2;
    var yBot = cy + dPx / 2;
    var xLeft = cx - maxHpx / 2;
    var xRight = cx + maxHpx / 2;

    var pTopL, pTopR, pBotL, pBotR;
    if (flatOnRight) {
      // Flat edge on the right (anatomically appropriate for right shoulder).
      pTopR = { x: xRight, y: yTop };
      pTopL = { x: xRight - hSupPx, y: yTop };
      pBotR = { x: xRight, y: yBot };
      pBotL = { x: xRight - hInfPx, y: yBot };
    } else {
      // Flat edge on the left (left shoulder).
      pTopL = { x: xLeft, y: yTop };
      pTopR = { x: xLeft + hSupPx, y: yTop };
      pBotL = { x: xLeft, y: yBot };
      pBotR = { x: xLeft + hInfPx, y: yBot };
    }

    // Rotate the polygon so the ANGLED edge becomes vertical.
    // For flatOnRight: angled edge on left, slopes inward from upper-left to lower-right
    //   → rotate CW by slope angle.
    // For !flatOnRight: angled edge on right, slopes from upper-right to lower-left
    //   → rotate CCW (opposite sign).
    var slopeAngleRad = Math.atan2(hSupPx - hInfPx, dPx);
    var rotateDeg = (slopeAngleRad * 180 / Math.PI) * (flatOnRight ? 1 : -1);

    function rot(x, y) {
      var a = rotateDeg * Math.PI / 180;
      var c = Math.cos(a), s = Math.sin(a);
      var dx = x - cx, dy = y - cy;
      return { x: cx + c * dx - s * dy, y: cy + s * dx + c * dy };
    }

    var topMidX = (pTopL.x + pTopR.x) / 2;
    var botMidX = (pBotL.x + pBotR.x) / 2;
    var topAnchor = rot(topMidX, yTop);
    var botAnchor = rot(botMidX, yBot);

    var rotateAttr = 'transform="rotate(' + f(rotateDeg) + ' ' + f(cx) + ' ' + f(cy) + ')"';

    var html =
      '<g ' + rotateAttr + '>' +
        '<polygon points="' +
          f(pTopL.x) + ',' + f(pTopL.y) + ' ' +
          f(pTopR.x) + ',' + f(pTopR.y) + ' ' +
          f(pBotR.x) + ',' + f(pBotR.y) + ' ' +
          f(pBotL.x) + ',' + f(pBotL.y) +
        '" fill="' + color + '" fill-opacity="0.14" stroke="' + color + '" stroke-width="1"/>' +
        // Guide lines at top (sup thickness) and bottom (inf thickness)
        '<line x1="' + f(pTopL.x) + '" y1="' + f(yTop) + '" x2="' + f(pTopR.x) + '" y2="' + f(yTop) + '" stroke="' + color + '" stroke-width="0.5" opacity="0.7"/>' +
        '<line x1="' + f(pBotL.x) + '" y1="' + f(yBot) + '" x2="' + f(pBotR.x) + '" y2="' + f(yBot) + '" stroke="' + color + '" stroke-width="0.5" opacity="0.7"/>' +
      '</g>' +
      // Labels: positioned at the rotated polygon's top/bottom anchors but rendered upright
      '<text class="ts" x="' + f(topAnchor.x) + '" y="' + f(topAnchor.y - 28) + '" text-anchor="middle" fill="' + color + '" font-weight="600">sup</text>' +
      '<text class="ts" x="' + f(topAnchor.x) + '" y="' + f(topAnchor.y - 14) + '" text-anchor="middle" fill="' + color + '">' + hSup.toFixed(2) + ' mm</text>' +
      '<text class="ts" x="' + f(botAnchor.x) + '" y="' + f(botAnchor.y + 24) + '" text-anchor="middle" fill="' + color + '">' + hInf.toFixed(2) + ' mm</text>' +
      '<text class="ts" x="' + f(botAnchor.x) + '" y="' + f(botAnchor.y + 38) + '" text-anchor="middle" fill="' + color + '" font-weight="600">inf</text>';

    g.innerHTML = html;
  }

  function drawResultLine(groupId, dirRad, resultMin, resultMax, clockStr) {
    var g = $(groupId);
    var cx = 180, cy = 230, rPx = 100;
    var dx = rPx * Math.cos(dirRad);
    var dy = rPx * Math.sin(dirRad);
    var maxX = cx + dx, maxY = cy - dy;
    var minX = cx - dx, minY = cy + dy;
    var lblOffset = 8;
    var lblMaxX = cx + (rPx + lblOffset) * Math.cos(dirRad);
    var lblMaxY = cy - (rPx + lblOffset) * Math.sin(dirRad);
    var lblMinX = cx - (rPx + lblOffset) * Math.cos(dirRad);
    var lblMinY = cy + (rPx + lblOffset) * Math.sin(dirRad);

    // Anchor labels at the edge closest to the circle so they extend outward
    var threshold = 5;
    var anchorMax, anchorMin;
    if (Math.abs(dx) < threshold) {
      anchorMax = 'middle';
      anchorMin = 'middle';
    } else if (dx > 0) {
      anchorMax = 'start';
      anchorMin = 'end';
    } else {
      anchorMax = 'end';
      anchorMin = 'start';
    }

    g.innerHTML =
      '<line x1="' + f(minX) + '" y1="' + f(minY) + '" x2="' + f(maxX) + '" y2="' + f(maxY) + '" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>' +
      '<circle cx="' + f(minX) + '" cy="' + f(minY) + '" r="3.5" fill="#000"/>' +
      '<circle cx="' + f(maxX) + '" cy="' + f(maxY) + '" r="3.5" fill="#000"/>' +
      '<text class="th" x="' + f(lblMaxX) + '" y="' + f(lblMaxY + 4) + '" text-anchor="' + anchorMax + '" fill="#000">' + resultMax.toFixed(2) + ' (' + clockStr + ')</text>' +
      '<text class="th" x="' + f(lblMinX) + '" y="' + f(lblMinY + 4) + '" text-anchor="' + anchorMin + '" fill="#000">' + resultMin.toFixed(2) + '</text>';
  }

  // Anatomy state (driven by side selection — no manual toggle UI anymore)
  var leftAnat = 'post';

  function setAnatomy(pos) {
    leftAnat = pos;
    $('anat-label-left').textContent = pos;
    $('anat-label-right').textContent = (pos === 'ant') ? 'post' : 'ant';
  }

  function getAnatomyState() {
    return leftAnat;
  }

  // Side selection modal
  window.wedgeSide = 'right';

  function showSideModal() { $('side-modal').classList.remove('hidden'); }
  function hideSideModal() { $('side-modal').classList.add('hidden'); }

  function setSide(side) {
    window.wedgeSide = side;
    // Right shoulder -> posterior on left of circle (so left=post)
    // Left shoulder  -> anterior on left of circle (so left=ant)
    setAnatomy(side === 'right' ? 'post' : 'ant');
    $('side-indicator-text').textContent = side === 'right' ? 'Right shoulder' : 'Left shoulder';
    hideSideModal();
    update();
  }

  document.querySelectorAll('.modal-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { setSide(btn.dataset.side); });
  });

  $('change-side-link').addEventListener('click', function (e) {
    e.preventDefault();
    showSideModal();
  });

  window.wedgeState = {};

  function update() {
    var D = clamp(parseFloat($('d-in').value), 1, 500);
    var a1 = clamp(parseFloat($('a1-in').value), -80, 80);
    var h1min = clamp(parseFloat($('h1-in').value), 0, 1000);
    var a2 = clamp(parseFloat($('a2-in').value), -80, 80);

    var tan1 = Math.tan(a1 * Math.PI / 180);
    var tan2 = Math.tan(a2 * Math.PI / 180);

    var h1max = h1min + D * tan1;
    var center = (h1min + h1max) / 2;
    var halfD2 = (D / 2) * tan2;
    var h2min = center - halfD2;
    var h2max = center + halfD2;

    var leftAnat = getAnatomyState();
    var rightAnat = (leftAnat === 'ant') ? 'post' : 'ant';

    // Mirror the geometry visually when the anterior side is on the left of the circle
    // (left shoulder). Convention: posterior is the HIGHER side, anterior is the LOWER side.
    // For right shoulder (post on left of circle): tan2 negative so wedge tilts toward -x (post).
    // For left shoulder (post on right): tan2 positive so wedge tilts toward +x (post).
    var mirrored = (leftAnat === 'ant');
    var tan2Signed = mirrored ? tan2 : -tan2;

    var combAng = Math.atan(Math.sqrt(tan1*tan1 + tan2*tan2)) * 180 / Math.PI;
    var resultDirRad = Math.atan2(tan1, tan2Signed);
    var halfDiff = (D / 2) * Math.sqrt(tan1*tan1 + tan2*tan2);
    var resultMin = center - halfDiff;
    var resultMax = center + halfDiff;
    var clockStr = formatClockPosition(resultDirRad);

    // Visual heights at left/right of the circle: posterior side shows h2max (higher),
    // anterior side shows h2min (lower).
    var hVisualLeft = mirrored ? h2min : h2max;
    var hVisualRight = mirrored ? h2max : h2min;

    setText('lbl-d', 'Ø ' + D.toFixed(2) + ' mm');
    setText('lbl-c', 'Center ' + center.toFixed(2) + ' mm');
    setText('lbl-n', h1max.toFixed(2));
    setText('lbl-s', h1min.toFixed(2));
    setText('lbl-w', hVisualLeft.toFixed(2));
    setText('lbl-e', hVisualRight.toFixed(2));
    setText('lbl-result', combAng.toFixed(2) + '° at ' + clockStr);
    setText('section1-header', 'Section - sup/inf (' + a1 + '°)');
    setText('section2-header', 'Section - ant/post (' + a2 + '°)');

    // Use same scale for both section views so they have consistent dimensions
    var allHeights = Math.max(h1max, h1min, hVisualLeft, hVisualRight, 0.5);
    var sharedScale = Math.min(200 / D, 60 / allHeights);
    drawSideVertical('side-view-1', D, h1max, h1min, 510, 160, '#378ADD', mirrored, sharedScale);
    drawSide('side-view-2', D, hVisualLeft, hVisualRight, 510, 365, '#1D9E75', leftAnat, rightAnat, sharedScale);
    drawResultLine('result-slope-line', resultDirRad, resultMin, resultMax, clockStr);

    // Anatomical heights: anterior is the lower side, posterior is the higher
    var antHeight = h2min;
    var postHeight = h2max;

    $('sum').innerHTML =
      '<div><span class="k">Center height</span><span class="v">' + center.toFixed(2) + ' mm</span></div>' +
      '<div><span class="k">Inferior height (mm) = lateralization</span><span class="v">' + h1min.toFixed(2) + ' mm</span></div>' +
      '<div><span class="k">Resulting min. height</span><span class="v">' + resultMin.toFixed(2) + ' mm</span></div>' +
      '<div><span class="k">Resulting max. height</span><span class="v">' + resultMax.toFixed(2) + ' mm</span></div>' +
      '<div><span class="k">Resulting slope angle</span><span class="v">' + combAng.toFixed(2) + '°</span></div>' +
      '<div><span class="k">Clock position</span><span class="v">' + clockStr + '</span></div>';

    var state = {
      D: D, a1: a1, a2: a2,
      h1min: h1min, h1max: h1max,
      h2min: h2min, h2max: h2max,
      center: center, combAng: combAng,
      resultMin: resultMin, resultMax: resultMax,
      resultDirRad: resultDirRad,
      antHeight: antHeight, postHeight: postHeight,
      leftAnat: leftAnat,
      side: window.wedgeSide,
      mirrored: mirrored,
      clockStr: clockStr
    };
    window.wedgeState = state;
    document.dispatchEvent(new CustomEvent('wedge-updated', { detail: state }));
  }

  window.requestWedgeUpdate = update;

  // Debounced update with validation
  var updateTimer = null;
  function debouncedUpdate() {
    if (updateTimer) clearTimeout(updateTimer);
    updateTimer = setTimeout(function() {
      // Only update if diameter is reasonable (prevent freeze on partial input)
      var dVal = parseFloat($('d-in').value);
      if (isNaN(dVal) || dVal < 5 || dVal > 200) return;
      update();
    }, 500);
  }
  // Only wedge parameter inputs trigger update (not checkbox)
  ['d-in', 'a1-in', 'h1-in', 'a2-in', 'pat-id', 'hole-dia-in'].forEach(function (id) {
    var el = $(id);
    if (el) el.addEventListener('input', debouncedUpdate);
  });
  // Filter invalid chars from Patient ID (allow only A-Z, 0-9, hyphen, dot, space)
  $('pat-id').addEventListener('input', function () {
    this.value = this.value.replace(/[^A-Za-z0-9\-\.\s]/g, '');
  });

  // Initial render with default 'right' side (left=post)
  setAnatomy('post');

  showSideModal();

  // Both Reset buttons (mobile + desktop variants) use data-reset attribute
  document.querySelectorAll('[data-reset]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      // Full reset: reload the page so all inputs (incl. Patient ID) return to defaults
      // and the Side modal reappears. Matches the behavior of Reset in glenoid.
      window.location.reload();
    });
  });

  // PDF export

  function svgToPng(svgEl, targetWidth) {
    var cloned = svgEl.cloneNode(true);
    var styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    styleEl.textContent = [
      'text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }',
      'text.t  { font-size: 14px; fill: #1a1a1a; }',
      'text.ts { font-size: 12px; fill: #555; }',
      'text.th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }'
    ].join('\n');
    cloned.insertBefore(styleEl, cloned.firstChild);

    var viewBox = cloned.getAttribute('viewBox') || '0 0 680 460';
    var parts = viewBox.split(' ').map(parseFloat);
    var vbW = parts[2], vbH = parts[3];
    cloned.setAttribute('width', vbW);
    cloned.setAttribute('height', vbH);

    var svgString = new XMLSerializer().serializeToString(cloned);
    var blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(blob);

    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.onload = function () {
        var canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = Math.round(targetWidth * (vbH / vbW));
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        resolve({ dataUrl: canvas.toDataURL('image/png'), width: canvas.width, height: canvas.height });
      };
      img.onerror = function (e) { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  async function exportPDF() {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF('p', 'mm', 'a4');
    var pageW = 210, pageH = 297, margin = 20;

      doc.setTextColor(40);
      doc.text('Patient ID: ' + (patId || ''), margin, 32);
      dateY = 38;
      dividerY = 42;
      contentStartY = 52;
    }

    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(120);
    var now = new Date();
    var dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString().substring(0, 5);
    doc.text('Generated: ' + dateStr, margin, dateY);
    doc.setTextColor(30);

    doc.setDrawColor(220);
    doc.setLineWidth(0.3);
    doc.line(margin, dividerY, pageW - margin, dividerY);

    var y = contentStartY;
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Input parameters', margin, y);
    y += 7;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');

    function row(label, value) {
      doc.setTextColor(90);
      doc.text(label, margin + 2, y);
      doc.setTextColor(20);
      doc.text(value, margin + 75, y);
      y += 5.5;
    }

    row('Side', s.side === 'right' ? 'Right shoulder' : 'Left shoulder');
    row('Diameter D', s.D.toFixed(2) + ' mm');
    row('Sup/Inf - angle', s.a1 + '°');
    row('Inf height', s.h1min.toFixed(2) + ' mm');
    row('Ant/Post - angle', s.a2 + '°');

    y += 4;
    var svgEl = document.querySelector('.diagram-wrap svg');
    var png = await svgToPng(svgEl, 1600);
    var aspect = png.height / png.width;
    var imgW = contentW;
    var imgH = imgW * aspect;
    doc.addImage(png.dataUrl, 'PNG', margin, y, imgW, imgH);
    y += imgH + 8;

    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(20);
    doc.text('Computed values', margin, y);
    y += 7;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');

    row('Center height', s.center.toFixed(2) + ' mm');
    row('Inferior height (mm) = lateralization', s.h1min.toFixed(2) + ' mm');
    row('Resulting min. height', s.resultMin.toFixed(2) + ' mm');
    row('Resulting max. height', s.resultMax.toFixed(2) + ' mm');
    row('Resulting slope angle', s.combAng.toFixed(2) + '°');
    row('Clock position', s.clockStr);

    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text('Generated by ShoulderApp · For research and educational use only.', margin, pageH - 14);

    var fileDate = now.toISOString().slice(2, 10); // YY-MM-DD
    var sideChar = (window.wedgeSide === 'left') ? 'L' : 'R';
    var pdfPatId = (($('pat-id') && $('pat-id').value) || '').trim();
    doc.save(fileDate + '_wedge_guide_' + sideChar + '-' + (pdfPatId || '') + '.pdf');
  }

  $('download-pdf').addEventListener('click', function () {
    var btn = $('download-pdf');
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    exportPDF()
      .catch(function (err) {
        console.error(err);
        alert('Could not generate PDF. See console for details.');
      })
      .then(function () {
        btn.disabled = false;
        btn.textContent = orig;
      });
  });
})();

<script type="module">
  try {
    const THREE = await import('three');
    const { TrackballControls } = await import('three/addons/controls/TrackballControls.js');
    const { CSS2DRenderer, CSS2DObject } = await import('three/addons/renderers/CSS2DRenderer.js');
    const { STLExporter } = await import('three/addons/exporters/STLExporter.js');
    const { TextGeometry } = await import('three/addons/geometries/TextGeometry.js');
    const { FontLoader } = await import('three/addons/loaders/FontLoader.js');

    // Load font for text relief
    let loadedFont = null;
    const fontLoader = new FontLoader();
    try {
      loadedFont = await new Promise((resolve, reject) => {
        fontLoader.load('./lib/three/examples/fonts/helvetiker_regular.typeface.json', resolve, undefined, reject);
      });
    } catch (e) { console.warn('Font load failed, text relief disabled:', e); }

    const container = document.getElementById('three-container');
    const fallback = container.querySelector('.viewer-fallback');
    if (fallback) fallback.remove();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(50, 100, 60);
    scene.add(dirLight);

    const wedgeMaterial = new THREE.MeshLambertMaterial({
      color: 0x87CEEB,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.85,
      polygonOffset: true,
      polygonOffsetFactor: 1,
      polygonOffsetUnits: 1
    });
    const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x444444 });

    // Helper: create 3D text relief mesh
    function createTextRelief(text, size, depth, material) {
      if (!loadedFont || !text) return null;
      const textGeom = new TextGeometry(text, {
        font: loadedFont,
        size: size,
        height: depth,
        depth: depth,
        curveSegments: 3,
        bevelEnabled: false
      });
      textGeom.computeBoundingBox();
      return new THREE.Mesh(textGeom, material);
    }

    const grid = new THREE.GridHelper(1000, 50, 0xdddddd, 0xeeeeee);
    grid.material.transparent = true;
    grid.material.opacity = 0.6;
    scene.add(grid);

    // TrackballControls — free rotation in all directions, no limits
    const controls = new TrackballControls(camera, renderer.domElement);
    controls.rotateSpeed = 3.5;
    controls.zoomSpeed = 1.4;
    controls.panSpeed = 0;
    controls.noPan = true;
    controls.staticMoving = false;
    controls.dynamicDampingFactor = 0.15;
    controls.minDistance = 5;
    controls.maxDistance = 5000;

    let wedgeMesh = null;
    let wedgeEdges = null;
    let markers = [];
    let labels = [];
    let cameraInitialized = false;

    function buildWedgeGeometry(D, h1min, h1max, h2min, h2max, mirrored, holeDia, grooveW, grooveD) {
      const r = D / 2;
      const segments = 96; // performance optimized
      const center = (h1min + h1max) / 2;
      const tanA1 = (h1max - h1min) / D;
      const tanA2 = (h2max - h2min) / D * (mirrored ? -1 : 1);
      const halfDiff = r * Math.sqrt(tanA1 * tanA1 + tanA2 * tanA2);
      const resultMax = center + halfDiff;
      const thickness = (x, z) => center + tanA2 * x + tanA1 * z;
      const angledY = (x, z) => resultMax - thickness(x, z);

      const holeR = (holeDia || 0) / 2;
      const gW = grooveW || 0;
      const gD = grooveD || 0;
      const resAngle = Math.atan2(tanA1, tanA2); // resulting slope direction

      const positions = [];
      const indices = [];

      const hSegs = 24;

      // Groove depth function (needed before chamfer rings)
      const grooveDepthVal = gW > 0 ? gW / 2 : 0;
      const cosRA = Math.cos(resAngle), sinRA = Math.sin(resAngle);
      function getGrooveY(x, z, noFade) {
        if (gW <= 0) return 0;
        // Smooth fadeout near edge: reduce groove depth as we approach r
        const dist = Math.sqrt(x*x + z*z);
        const fadeStart = r - 2; // start fading 2mm from edge
        const edgeFade = noFade ? 1 : (dist > fadeStart ? Math.max(0, 1 - (dist - fadeStart) / 2) : 1);

        const lz1 = -x * sinRA + z * cosRA;
        if (Math.abs(lz1) < gW / 2) {
          return -Math.sqrt((gW/2)*(gW/2) - lz1*lz1) * edgeFade;
        }
        const siLen = (r * 2 - 1) / 8;
        const lz2 = -x;
        const lx2 = z;
        if (Math.abs(lz2) < gW / 2) {
          if (lx2 > r - siLen - 1 && lx2 < r + 1) return -Math.sqrt((gW/2)*(gW/2) - lz2*lz2) * edgeFade;
          if (lx2 < -r + siLen + 1 && lx2 > -r - 1) return -Math.sqrt((gW/2)*(gW/2) - lz2*lz2) * edgeFade;
        }
        return 0;
      }

      // ── Chamfer rings (must be created before triangulation) ──
      const chW = 0.1;
      const topChBase = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const x = (r - chW) * Math.cos(theta);
        const z = (r - chW) * Math.sin(theta);
        const gy = getGrooveY(x, z, true); // no fade — extend groove to edge
        // If in groove zone, push vertex to full r (no chamfer)
        if (gy < -0.01) {
          positions.push(r * Math.cos(theta), resultMax + gy, r * Math.sin(theta));
        } else {
          positions.push(x, resultMax, z);
        }
      }
      const outerRimBase_wall = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        const gy = getGrooveY(x, z, true); // no fade — extend groove to edge
        // If in groove zone, keep at resultMax with groove depth (no chamfer drop)
        if (gy < -0.01) {
          positions.push(x, resultMax + gy, z);
        } else {
          positions.push(x, resultMax - chW, z);
        }
      }
      const botRimBase_wall = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        const gy = getGrooveY(x, z, true); // extend groove down the wall
        // Push wall inward where groove crosses
        if (gy < -0.01) {
          const rInset = r + gy; // gy is negative, so wall moves inward
          positions.push(rInset * Math.cos(theta), angledY(x, z) + chW, rInset * Math.sin(theta));
        } else {
          positions.push(x, angledY(x, z) + chW, z);
        }
      }
      const botChBase = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const xBase = (r - chW) * Math.cos(theta);
        const zBase = (r - chW) * Math.sin(theta);
        const gy = getGrooveY(r * Math.cos(theta), r * Math.sin(theta), true);
        if (gy < -0.01) {
          const rInset = (r - chW) + gy;
          positions.push(rInset * Math.cos(theta), angledY(xBase, zBase), rInset * Math.sin(theta));
        } else {
          positions.push(xBase, angledY(xBase, zBase), zBase);
        }
      }

      // ── FLAT TOP: annulus from holeR to r ──
      // Hole chamfer rings (top + bottom)
      const holeChTopBase = positions.length / 3;
      if (holeR > 0) {
        // Chamfer ring at (holeR + chW, resultMax) — flat top side
        for (let i = 0; i < hSegs; i++) {
          const theta = (i / hSegs) * Math.PI * 2;
          positions.push((holeR + chW) * Math.cos(theta), resultMax, (holeR + chW) * Math.sin(theta));
        }
      }
      const holeRimBase = positions.length / 3;
      if (holeR > 0) {
        // Actual hole rim at (holeR, resultMax - chW)
        for (let i = 0; i < hSegs; i++) {
          const theta = (i / hSegs) * Math.PI * 2;
          positions.push(holeR * Math.cos(theta), resultMax - chW, holeR * Math.sin(theta));
        }
      }

      const outerRimBase = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        positions.push(r * Math.cos(theta), resultMax, r * Math.sin(theta));
      }

      // getGrooveY already defined above (before chamfer rings)

      // Build annulus with concentric rings (more rings for smooth grooves)
      if (holeR > 0) {
        const nRings = 8;
        const ringBases = [];
        ringBases.push(holeChTopBase);
        for (let ri = 1; ri < nRings; ri++) {
          const t = ri / nRings;
          const ringR = holeR + (r - holeR) * t;
          const base = positions.length / 3;
          for (let i = 0; i < segments; i++) {
            const theta = (i / segments) * Math.PI * 2;
            const x = ringR * Math.cos(theta);
            const z = ringR * Math.sin(theta);
            const gy = getGrooveY(x, z);
            positions.push(x, resultMax + gy, z);
          }
          ringBases.push(base);
        }
        ringBases.push(topChBase);

        for (let ri = 0; ri < ringBases.length - 1; ri++) {
          const bA = ringBases[ri];
          const bB = ringBases[ri + 1];
          const segsA = (ri === 0) ? hSegs : segments;
          for (let i = 0; i < segments; i++) {
            const ni = (i + 1) % segments;
            const iA = bA + (ri === 0 ? Math.round(i * hSegs / segments) % hSegs : i);
            const niA = bA + (ri === 0 ? Math.round(ni * hSegs / segments) % hSegs : ni);
            indices.push(iA, niA, bB + ni);
            indices.push(iA, bB + ni, bB + i);
          }
        }
      } else {
        const centerIdx = positions.length / 3;
        positions.push(0, resultMax, 0);
        for (let i = 0; i < segments; i++) {
          indices.push(centerIdx, topChBase + i, topChBase + ((i + 1) % segments));
        }
      }

      // ── ANGLED BOTTOM ──
      const botCenter = positions.length / 3;
      positions.push(0, angledY(0, 0), 0);
      const botRimBase = positions.length / 3;
      for (let i = 0; i < segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        positions.push(x, angledY(x, z), z);
      }
      const botHoleBase = positions.length / 3;
      if (holeR > 0) {
        for (let i = 0; i < hSegs; i++) {
          const theta = (i / hSegs) * Math.PI * 2;
          const x = holeR * Math.cos(theta);
          const z = holeR * Math.sin(theta);
          positions.push(x, angledY(x, z), z);
        }
        // NO fan from botCenter to hole rim — that would fill the hole!
        // Only annulus from hole rim to outer rim:
        for (let i = 0; i < segments; i++) {
          const ni = (i + 1) % segments;
          const iH = botHoleBase + Math.round(i * hSegs / segments) % hSegs;
          const niH = botHoleBase + Math.round(ni * hSegs / segments) % hSegs;
          indices.push(iH, niH, botChBase + ni);
          indices.push(iH, botChBase + ni, botChBase + i);
        }
      } else {
        for (let i = 0; i < segments; i++) {
          indices.push(botCenter, botChBase + ((i + 1) % segments), botChBase + i);
        }
      }

      // ── SIDE WALL with chamfered edges ──
      // Top chamfer: topChBase → outerRimBase_wall (45°)
      for (let i = 0; i < segments; i++) {
        const ni = (i + 1) % segments;
        indices.push(topChBase + i, topChBase + ni, outerRimBase_wall + ni);
        indices.push(topChBase + i, outerRimBase_wall + ni, outerRimBase_wall + i);
      }
      // Side wall: outerRimBase_wall → botRimBase_wall (vertical)
      for (let i = 0; i < segments; i++) {
        const ni = (i + 1) % segments;
        indices.push(outerRimBase_wall + i, outerRimBase_wall + ni, botRimBase_wall + ni);
        indices.push(outerRimBase_wall + i, botRimBase_wall + ni, botRimBase_wall + i);
      }
      // Bottom chamfer: botRimBase_wall → botChBase (45°)
      for (let i = 0; i < segments; i++) {
        const ni = (i + 1) % segments;
        indices.push(botRimBase_wall + i, botRimBase_wall + ni, botChBase + ni);
        indices.push(botRimBase_wall + i, botChBase + ni, botChBase + i);
      }

      // ── HOLE INNER WALL + CHAMFERS ──
      if (holeR > 0) {
        // Top hole chamfer: holeChTopBase → holeRimBase (45°)
        for (let i = 0; i < hSegs; i++) {
          const ni = (i + 1) % hSegs;
          indices.push(holeChTopBase + i, holeRimBase + i, holeRimBase + ni);
          indices.push(holeChTopBase + i, holeRimBase + ni, holeChTopBase + ni);
        }

        // Bottom hole chamfer ring at (holeR + chW, angledY)
        const holeChBotBase = positions.length / 3;
        for (let i = 0; i < hSegs; i++) {
          const theta = (i / hSegs) * Math.PI * 2;
          const x = (holeR + chW) * Math.cos(theta);
          const z = (holeR + chW) * Math.sin(theta);
          positions.push(x, angledY(x, z), z);
        }
        // Move botHoleBase to (holeR, angledY + chW)
        // Actually botHoleBase already exists at (holeR, angledY). We need a new ring.
        const botHoleWall = positions.length / 3;
        for (let i = 0; i < hSegs; i++) {
          const theta = (i / hSegs) * Math.PI * 2;
          const x = holeR * Math.cos(theta);
          const z = holeR * Math.sin(theta);
          positions.push(x, angledY(x, z) + chW, z);
        }

        // Inner wall: holeRimBase → botHoleWall
        for (let i = 0; i < hSegs; i++) {
          const ni = (i + 1) % hSegs;
          indices.push(holeRimBase + i, botHoleWall + i, botHoleWall + ni);
          indices.push(holeRimBase + i, botHoleWall + ni, holeRimBase + ni);
        }
        // Bottom hole chamfer: botHoleWall → botHoleBase (45°)
        for (let i = 0; i < hSegs; i++) {
          const ni = (i + 1) % hSegs;
          indices.push(botHoleWall + i, botHoleBase + i, botHoleBase + ni);
          indices.push(botHoleWall + i, botHoleBase + ni, botHoleWall + ni);
        }
        // Bottom annulus connects botHoleBase → botChBase (already done above)
        // But botHoleBase→botChBase should use holeChBotBase instead
        // Actually the bottom annulus already uses botHoleBase which is at (holeR, angledY)
        // We need to reconnect: botHoleBase → holeChBotBase → botChBase
        // For simplicity, just add the chamfer ring connection:
        // holeChBotBase sits between botHoleBase and the bottom surface
        // Already handled by botHoleBase→botChBase annulus above
      }

      // ── RIDGE: grooves are now built into flat top geometry via getGrooveY ──
      // Old separate ridge geometry disabled
      if (false && gW > 0) {
        const ridgeH = 1.5; // height
        const ridgeW = gW;  // width (1mm)
        const ridgeLen = D - 1;
        const rCSeg = 32; // cross-section segments (smooth round)
        const cosR = Math.cos(resAngle), sinR = Math.sin(resAngle);
        const rRadW = ridgeLen / 2; // half-length along axis
        const rRadH = ridgeH;       // height
        const ridgeDepth = 0.8;   // mm depth into wedge surface
        // Use dark material with polygon offset to show through flat top
        const grooveMat = new THREE.MeshLambertMaterial({
          color: 0x222222, transparent: true, opacity: 0.9,
          side: THREE.DoubleSide, depthWrite: false,
          polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1
        });
        const rRadT = ridgeW / 2;   // half-width perpendicular

        // Build as extruded ellipse along resulting axis
        const rPos = [];
        const rIdx = [];
        const rLayers = [];
        const rLSegs = 24;

        // Build ridge in segments, skipping where hole is
        const holeGap = holeR > 0 ? holeR + 0.5 : 0;

        function buildRidgeSegment(uStart, uEnd, dirCos, dirSin) {
          const cR = dirCos !== undefined ? dirCos : cosR;
          const sR = dirSin !== undefined ? dirSin : sinR;
          const segLayers = [];
          const nL = Math.max(2, Math.round(rLSegs * Math.abs(uEnd - uStart) / ridgeLen));
          for (let li = 0; li <= nL; li++) {
            const u = uStart + (uEnd - uStart) * (li / nL);
            const base = rPos.length / 3;
            for (let ci = 0; ci < rCSeg; ci++) {
              const a = (ci / rCSeg) * Math.PI * 2;
              const perpOff = rRadT * Math.cos(a);
              // Groove: half-ellipse below surface, deepest = -ridgeDepth
              const yOff = -ridgeDepth * Math.max(0, Math.sin(a));
              const wx = u * cR - perpOff * sR;
              const wz = u * sR + perpOff * cR;
              rPos.push(wx, resultMax + yOff, wz);
            }
            segLayers.push(base);
          }
          for (let li = 0; li < segLayers.length - 1; li++) {
            for (let ci = 0; ci < rCSeg; ci++) {
              const nc = (ci + 1) % rCSeg;
              rIdx.push(segLayers[li]+ci, segLayers[li]+nc, segLayers[li+1]+nc);
              rIdx.push(segLayers[li]+ci, segLayers[li+1]+nc, segLayers[li+1]+ci);
            }
          }
          const capSteps = 4;
          for (const endI of [0, segLayers.length - 1]) {
            const eu = endI === 0 ? uStart : uEnd;
            const endSign = endI === 0 ? -1 : 1;
            let prevCap = segLayers[endI];
            for (let di = 1; di <= capSteps; di++) {
              const da = (Math.PI / 2) * (di / capSteps);
              const scale = Math.cos(da);
              const uOff = rRadT * Math.sin(da);
              const capBase = rPos.length / 3;
              const cu = eu + endSign * uOff;
              for (let ci = 0; ci < rCSeg; ci++) {
                const a2 = (ci / rCSeg) * Math.PI * 2;
                const perpOff = rRadT * scale * Math.cos(a2);
                const yOff = -ridgeDepth * Math.max(0, scale * Math.sin(a2));
                rPos.push(cu * cR - perpOff * sR, resultMax + yOff, cu * sR + perpOff * cR);
              }
              for (let ci = 0; ci < rCSeg; ci++) {
                const nc = (ci + 1) % rCSeg;
                if (endSign === 1) {
                  rIdx.push(prevCap+ci, prevCap+nc, capBase+nc);
                  rIdx.push(prevCap+ci, capBase+nc, capBase+ci);
                } else {
                  rIdx.push(prevCap+ci, capBase+ci, capBase+nc);
                  rIdx.push(prevCap+ci, capBase+nc, prevCap+nc);
                }
              }
              prevCap = capBase;
            }
            // Tip point
            const tipIdx = rPos.length / 3;
            const tipU = eu + endSign * rRadT;
            rPos.push(tipU * cR, resultMax, tipU * sR); // tip at surface level
            for (let ci = 0; ci < rCSeg; ci++) {
              const nc = (ci + 1) % rCSeg;
              if (endSign === 1) rIdx.push(tipIdx, prevCap+ci, prevCap+nc);
              else rIdx.push(tipIdx, prevCap+nc, prevCap+ci);
            }
          }
        }

        // Resulting axis ridge (split around hole)
        if (holeGap > 0) {
          buildRidgeSegment(-ridgeLen / 2, -holeGap);
          buildRidgeSegment(holeGap, ridgeLen / 2);
        } else {
          buildRidgeSegment(-ridgeLen / 2, ridgeLen / 2);
        }

        // Sup/Inf ridges: perpendicular to resulting axis, 1/3 length, at outer edge
        const siLen = ridgeLen / 8; // shorter markers
        const siAngle = Math.atan2(1, 0); // sup/inf direction = along z-axis (tanA1 direction)
        const siCos = Math.cos(siAngle), siSin = Math.sin(siAngle);
        // Sup ridge (positive direction along sup/inf axis, at outer edge)
        buildRidgeSegment(r - siLen - 1, r - 1, siCos, siSin);
        // Inf ridge (negative direction, at outer edge)
        buildRidgeSegment(-r + 1, -r + siLen + 1, siCos, siSin);

        // Build ridge as separate geometry (for dark material)
        window._ridgeGeom = new THREE.BufferGeometry();
        window._ridgeGeom.setAttribute('position', new THREE.Float32BufferAttribute(rPos, 3));
        window._ridgeGeom.setIndex(rIdx);
        window._ridgeGeom.computeVertexNormals();
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geom.setIndex(indices);
      geom.computeVertexNormals();
      return geom;
    }

    function makeMarker(D, hexColor) {
      const sphereR = Math.max(D * 0.018, 0.15);
      const geom = new THREE.SphereGeometry(sphereR, 16, 16);
      const mat = new THREE.MeshBasicMaterial({ color: hexColor });
      return new THREE.Mesh(geom, mat);
    }

    function makeLabel(text, hexColor) {
      const div = document.createElement('div');
      div.className = 'three-label';
      div.textContent = text;
      div.style.color = hexColor;
      div.style.borderColor = hexColor;
      div.style.borderStyle = 'solid';
      div.style.borderWidth = '1px';
      return new CSS2DObject(div);
    }

    function disposeMesh(m) {
      if (!m) return;
      scene.remove(m);
      if (m.geometry) m.geometry.dispose();
    }

    let slopeLine = null;
    let slopeMaxMarker = null;
    let slopeMinMarker = null;
    let currentState = null;

    function rebuild(state) {
      currentState = state;
      disposeMesh(wedgeMesh);
      disposeMesh(wedgeEdges);
      disposeMesh(slopeLine);
      disposeMesh(slopeMaxMarker);
      disposeMesh(slopeMinMarker);
      for (const m of markers) disposeMesh(m);
      for (const l of labels) scene.remove(l);
      markers = [];
      labels = [];

      const mirrored = !!state.mirrored;
      const wedgeHoleDia = parseFloat(document.getElementById('hole-dia-in').value) || 3.4;
      const geom = buildWedgeGeometry(state.D, state.h1min, state.h1max, state.h2min, state.h2max, mirrored, wedgeHoleDia, 1, 1);

      // Build wedge as a group (wedge + handle + hole)
      const wedgeGroup = new THREE.Group();
      wedgeGroup.add(new THREE.Mesh(geom, wedgeMaterial));

      const r = state.D / 2;
      const leftAnatIs = state.leftAnat || 'ant';

      // ── Handle on anterior side, flat top ──
      const antDir = (leftAnatIs === 'post') ? -1 : 1;
      const handleThick = 3;
      const handleHeight = 30; // doubled
      const handleWidth = r * 2 / 3;
      const handleTiltDeg = 20; // tilt toward up along ant→post axis
      const handleTiltRad = handleTiltDeg * Math.PI / 180;
      const handleTiltSupDeg = 20; // tilt toward superior along sup→inf axis
      const handleTiltSupRad = handleTiltSupDeg * Math.PI / 180;
      const handleX = antDir * (r * 0.5);
      const handleBaseY = state.resultMax;

      // ── Handle: stadium/oval cross-section, sinusoidal grooves, dome top ──
      const hRadW = handleWidth / 2;  // half-width (along x from handleX)
      const hRadT = handleThick / 2;  // half-thickness (along z)
      const gripDepthH = 0.4;
      const gripSpacing = 2;
      const hCSeg = 16;

      const hPos = [];
      const hIdx = [];
      const hLayers = [];

      // Cross-section: ellipse (hRadW x hRadT) with optional shrink for grooves
      function hCrossSection(baseX, y, shrink, baseZ) {
        const baseIdx = hPos.length / 3;
        for (let j = 0; j < hCSeg; j++) {
          const a = (j / hCSeg) * Math.PI * 2;
          const cx = (hRadW - shrink) * Math.cos(a);
          const cz = (hRadT - shrink) * Math.sin(a);
          hPos.push(baseX + cx, y, (baseZ || 0) + cz);
        }
        return baseIdx;
      }

      // Y layers with sinusoidal grip grooves + tilt
      for (let ly = 0; ly <= handleHeight; ly += 0.5) {
        // Tilt: anterior direction + superior direction
        const tiltX = antDir * ly * Math.sin(handleTiltRad);
        const tiltZ = ly * Math.sin(handleTiltSupRad); // toward superior (+Z)
        const tiltY = ly * Math.cos(handleTiltRad) * Math.cos(handleTiltSupRad);
        const y = handleBaseY + tiltY;
        const baseX = handleX + tiltX;
        // Sinusoidal groove: smooth wave
        const grooveT = (ly - 1) / gripSpacing;
        const shrink = (grooveT >= 0 && ly < handleHeight - 1)
          ? gripDepthH * Math.max(0, Math.sin(grooveT * Math.PI * 2))
          : 0;
        hLayers.push(hCrossSection(baseX, y, shrink, tiltZ));
      }

      // Connect layers
      for (let i = 0; i < hLayers.length - 1; i++) {
        for (let j = 0; j < hCSeg; j++) {
          const nj = (j + 1) % hCSeg;
          hIdx.push(hLayers[i]+j, hLayers[i]+nj, hLayers[i+1]+nj);
          hIdx.push(hLayers[i]+j, hLayers[i+1]+nj, hLayers[i+1]+j);
        }
      }

      // Bottom cap (flat, connects to wedge)
      const hBotC = hPos.length / 3;
      hPos.push(handleX, handleBaseY, 0); // bottom cap at base (no tilt)
      for (let j = 0; j < hCSeg; j++) {
        hIdx.push(hBotC, hLayers[0] + ((j+1)%hCSeg), hLayers[0] + j);
      }

      // Dome top (hemisphere, tilted)
      const domeSteps = 6;
      const lastLayer = hLayers[hLayers.length - 1];
      let prevRing = lastLayer;
      // Tilted top position
      const topTiltX = handleX + antDir * handleHeight * Math.sin(handleTiltRad);
      const topTiltY = handleBaseY + handleHeight * Math.cos(handleTiltRad) * Math.cos(handleTiltSupRad);
      const topTiltZ = handleHeight * Math.sin(handleTiltSupRad);
      for (let di = 1; di <= domeSteps; di++) {
        const a = (Math.PI / 2) * (di / domeSteps);
        const scaleW = Math.cos(a);
        const ddy = hRadT * Math.sin(a);
        const y = topTiltY + ddy * Math.cos(handleTiltRad);
        const dx = antDir * ddy * Math.sin(handleTiltRad);
        const ringBase = hPos.length / 3;
        for (let j = 0; j < hCSeg; j++) {
          const ca = (j / hCSeg) * Math.PI * 2;
          hPos.push(topTiltX + dx + hRadW * scaleW * Math.cos(ca), y, topTiltZ + hRadT * scaleW * Math.sin(ca));
        }
        for (let j = 0; j < hCSeg; j++) {
          const nj = (j + 1) % hCSeg;
          hIdx.push(prevRing+j, prevRing+nj, ringBase+nj);
          hIdx.push(prevRing+j, ringBase+nj, ringBase+j);
        }
        prevRing = ringBase;
      }
      // Dome tip
      const domeTop = hPos.length / 3;
      const tipDy = (handleHeight + hRadT);
      hPos.push(
        topTiltX + antDir * hRadT * Math.sin(handleTiltRad),
        topTiltY + hRadT * Math.cos(handleTiltRad) * Math.cos(handleTiltSupRad),
        topTiltZ + hRadT * Math.sin(handleTiltSupRad)
      );
      for (let j = 0; j < hCSeg; j++) {
        hIdx.push(domeTop, prevRing+j, prevRing+((j+1)%hCSeg));
      }

      const handleGeom = new THREE.BufferGeometry();
      handleGeom.setAttribute('position', new THREE.Float32BufferAttribute(hPos, 3));
      handleGeom.setIndex(hIdx);
      handleGeom.computeVertexNormals();
      wedgeGroup.add(new THREE.Mesh(handleGeom, wedgeMaterial));

      // ── Text reliefs: skip during rapid updates, generate after 1s idle ──
      const sidePrefix = (window.wedgeSide === 'left' ? 'L' : 'R') + '-';
      const rawPatId = (document.getElementById('pat-id') && document.getElementById('pat-id').value || '').trim();
      const patId = sidePrefix + (rawPatId || '');
      // Defer text generation to avoid freeze during rapid input changes
      if (window._textTimer) clearTimeout(window._textTimer);
      window._textTimer = setTimeout(() => {
      if (!loadedFont) return;
      if (loadedFont) {
        const postDir = (leftAnatIs === 'post') ? 1 : -1;
        const wHoleR = wedgeHoleDia / 2;
        const kwireGuideR = wHoleR + 3; // K-wire guide outer radius
        const holeClr = wHoleR > 0 ? kwireGuideR + 1.5 : 0; // clear the guide cylinder
        const availWidth = r - holeClr - 1; // available space from hole to edge
        let fontSize = 1.8; // ~5pt for wedge Pat ID

        // Shrink font until text fits in one line within available width
        function measureTextW(text, size) {
          const tg = new TextGeometry(text, {
            font: loadedFont, size: size, height: 0.5, depth: 0.5,
            curveSegments: 3, bevelEnabled: false
          });
          tg.computeBoundingBox();
          const w = tg.boundingBox.max.x - tg.boundingBox.min.x;
          tg.dispose();
          return w;
        }
        // Shrink font if needed (min 0.8mm)
        while (fontSize > 0.8 && measureTextW(patId, fontSize) > availWidth) {
          fontSize -= 0.1;
        }

        // If still too wide at min font, split into lines
        function fitTextWedge(text, maxW) {
          if (measureTextW(text, fontSize) <= maxW) return [text];
          const nLines = Math.ceil(measureTextW(text, fontSize) / maxW);
          const cpl = Math.floor(text.length / nLines);
          const lines = [];
          for (let i = 0; i < text.length; i += cpl) lines.push(text.substring(i, i + cpl));
          return lines;
        }
        const lines = fitTextWedge(patId, availWidth);
        const lineSpacing = fontSize * 1.4;

        for (let li = 0; li < lines.length; li++) {
          const lineMesh = createTextRelief(lines[li], fontSize, 0.5, wedgeMaterial);
          if (lineMesh) {
            const bb = lineMesh.geometry.boundingBox;
            const tw = bb.max.x - bb.min.x;
            const zOff = -li * lineSpacing; // lines go downward (toward inf)
            lineMesh.rotation.x = -Math.PI / 2;
            lineMesh.rotation.z = Math.PI; // 180°
            const textStartX = postDir > 0 ? holeClr + tw : -(holeClr);
            lineMesh.position.set(textStartX, state.resultMax, zOff);
            wedgeGroup.add(lineMesh);
          }
        }
      }

      // ── Anatomical labels on wedge flat top (all 180° rotated) ──
      if (loadedFont) {
        const lblSize = 3.2;
        const lblDepth = 0.5;
        const wHoleR2 = wedgeHoleDia / 2;

        // Sup/Inf ridge inner ends (in sup/inf z-direction)
        const ridgeLenLocal = state.D - 1;
        const siLenLocal = ridgeLenLocal / 8;
        const supRidgeInner = r - siLenLocal - 1; // inner end of sup ridge
        const infRidgeInner = -r + siLenLocal + 1; // inner end of inf ridge

        // Sup/Inf: same distance from hole center
        const wHoleR3 = wedgeHoleDia / 2;
        const kwGuideR = wHoleR3 + 3; // K-wire guide outer radius
        const supDist = kwGuideR + 0.5;  // S just outside drill guide
        const infDist = kwGuideR + 1.5;  // I just outside drill guide

        const supMesh = createTextRelief('S', lblSize, lblDepth, wedgeMaterial);
        if (supMesh) {
          const bb = supMesh.geometry.boundingBox;
          const tw = bb.max.x - bb.min.x;
          supMesh.rotation.x = -Math.PI / 2;
          supMesh.rotation.z = Math.PI;
          supMesh.position.set(tw / 2, state.resultMax, supDist);
          wedgeGroup.add(supMesh);
        }

        const infMesh = createTextRelief('I', lblSize, lblDepth, wedgeMaterial);
        if (infMesh) {
          const bb = infMesh.geometry.boundingBox;
          const tw = bb.max.x - bb.min.x;
          const th = bb.max.y - bb.min.y;
          infMesh.rotation.x = -Math.PI / 2;
          infMesh.rotation.z = Math.PI;
          infMesh.position.set(tw / 2, state.resultMax, -(infDist + th / 2));
          wedgeGroup.add(infMesh);
        }

        // Ant label below handle
        const antMesh = createTextRelief('A', lblSize, lblDepth, wedgeMaterial);
        if (antMesh) {
          const bb = antMesh.geometry.boundingBox;
          const tw = bb.max.x - bb.min.x;
          antMesh.rotation.x = -Math.PI / 2;
          antMesh.rotation.z = Math.PI;
          const antOutward = antDir * 1;
          antMesh.position.set(handleX + antOutward + tw / 2, state.resultMax, -(handleThick / 2 + 4));
          wedgeGroup.add(antMesh);
        }
      }
      }, 800); // text generation deferred 800ms

      // ── K-wire guide cylinder (hollow tube extending upward from hole) ──
      if (wedgeHoleDia > 0) {
        const kwireR = wedgeHoleDia / 2;
        const kwireWall = 3;
        const kwireOuterR = kwireR + kwireWall;
        const kwireLen = 20; // total length including wedge portion
        const kwireSegs = 24;
        const kwireTopY = state.resultMax + kwireLen; // extends 20mm above flat top
        const kwireBaseY = kwireTopY - kwireLen; // = resultMax

        const kwFR = 1; // fillet radius for outer top edge
        const kwFN = 4; // fillet steps
        const kwPos = [];
        const kwIdx = [];
        // 6 vertices per segment: p0-p3 + p4 (fillet start outer) + p5 (fillet end inner-ish)
        for (let s = 0; s < kwireSegs; s++) {
          const th = (s / kwireSegs) * Math.PI * 2;
          const c = Math.cos(th), sn = Math.sin(th);
          kwPos.push(kwireOuterR * c, kwireBaseY,          kwireOuterR * sn);  // p0: outer bottom
          kwPos.push(kwireR * c,      kwireBaseY,          kwireR * sn);       // p1: inner bottom
          kwPos.push(kwireOuterR * c, kwireTopY - kwFR,    kwireOuterR * sn);  // p2: outer top (1mm down for fillet)
          kwPos.push(kwireR * c,      kwireTopY,           kwireR * sn);       // p3: inner top
        }
        const kv = (s, v) => s * 4 + v;
        for (let s = 0; s < kwireSegs; s++) {
          const ns = (s + 1) % kwireSegs;
          // Outer wall p0→p2
          kwIdx.push(kv(s,0), kv(ns,0), kv(ns,2)); kwIdx.push(kv(s,0), kv(ns,2), kv(s,2));
          // Inner wall p1→p3
          kwIdx.push(kv(s,1), kv(s,3), kv(ns,3)); kwIdx.push(kv(s,1), kv(ns,3), kv(ns,1));
          // Bottom annulus
          kwIdx.push(kv(s,0), kv(s,1), kv(ns,1)); kwIdx.push(kv(s,0), kv(ns,1), kv(ns,0));
        }

        // Outer top fillet: quarter circle from p2 (outer, topY-fR) to (outer-fR, topY)
        const filletRings = []; // base indices for fillet rings
        for (let fi = 0; fi <= kwFN; fi++) {
          const a = (Math.PI / 2) * (fi / kwFN);
          const base = kwPos.length / 3;
          for (let s = 0; s < kwireSegs; s++) {
            const th = (s / kwireSegs) * Math.PI * 2;
            const c = Math.cos(th), sn = Math.sin(th);
            const rF = (kwireOuterR - kwFR) + kwFR * Math.cos(a);
            const yF = (kwireTopY - kwFR) + kwFR * Math.sin(a);
            kwPos.push(rF * c, yF, rF * sn);
          }
          filletRings.push(base);
        }
        // Connect p2 → first fillet ring
        for (let s = 0; s < kwireSegs; s++) {
          const ns = (s + 1) % kwireSegs;
          kwIdx.push(kv(s,2), kv(ns,2), filletRings[0]+ns);
          kwIdx.push(kv(s,2), filletRings[0]+ns, filletRings[0]+s);
        }
        // Connect fillet rings
        for (let fi = 0; fi < filletRings.length - 1; fi++) {
          for (let s = 0; s < kwireSegs; s++) {
            const ns = (s + 1) % kwireSegs;
            kwIdx.push(filletRings[fi]+s, filletRings[fi]+ns, filletRings[fi+1]+ns);
            kwIdx.push(filletRings[fi]+s, filletRings[fi+1]+ns, filletRings[fi+1]+s);
          }
        }
        // Top annulus: last fillet ring → p3 (inner top)
        const lastFR = filletRings[filletRings.length - 1];
        for (let s = 0; s < kwireSegs; s++) {
          const ns = (s + 1) % kwireSegs;
          kwIdx.push(lastFR+s, lastFR+ns, kv(ns,3));
          kwIdx.push(lastFR+s, kv(ns,3), kv(s,3));
        }

        const kwGeom = new THREE.BufferGeometry();
        kwGeom.setAttribute('position', new THREE.Float32BufferAttribute(kwPos, 3));
        kwGeom.setIndex(kwIdx);
        kwGeom.computeVertexNormals();
        wedgeGroup.add(new THREE.Mesh(kwGeom, wedgeMaterial));
      }

      wedgeMesh = wedgeGroup;
      scene.add(wedgeMesh);

      const edgesGeom = new THREE.EdgesGeometry(geom, 15);
      wedgeEdges = new THREE.LineSegments(edgesGeom, edgeMaterial);
      scene.add(wedgeEdges);

      const blue = 0x185FA5;
      const teal = 0x0F6E56;

      // Markers sit on the angled BOTTOM face (now below the flat ceiling).
      const tanA1 = (state.h1max - state.h1min) / state.D;
      const tanA2 = (state.h2max - state.h2min) / state.D * (mirrored ? -1 : 1);
      const angledY = (x, z) => state.resultMax - (state.center + tanA2 * x + tanA1 * z);

      // Place markers on flat top, slightly inset from edge to sit on actual surface
      const markerR = r - 0.5;
      const points = [
        { pos: [-markerR, state.resultMax + 0.1, 0], color: teal, hex: '#0F6E56', label: leftAnatIs === 'ant' ? 'Post' : 'Ant' },
        { pos: [ markerR, state.resultMax + 0.1, 0], color: teal, hex: '#0F6E56', label: leftAnatIs === 'ant' ? 'Ant' : 'Post' },
        { pos: [ 0, state.resultMax + 0.1, -markerR], color: blue, hex: '#185FA5', label: 'Inf' },
        { pos: [ 0, state.resultMax + 0.1,  markerR], color: blue, hex: '#185FA5', label: 'Sup' }
      ];

      for (const p of points) {
        const marker = makeMarker(state.D, p.color);
        marker.position.set(p.pos[0], p.pos[1], p.pos[2]);
        scene.add(marker);
        markers.push(marker);

      }

      // Black resulting slope line on the angled BOTTOM, between thickest and thinnest points.
      // Thickest point: angled bottom dips to y=0 (resultMax - resultMax).
      // Thinnest point: angled bottom at y=resultMax-resultMin (closest to flat top).
      if (typeof state.resultDirRad === 'number') {
        const cos = Math.cos(state.resultDirRad);
        const sin = Math.sin(state.resultDirRad);
        const maxPoint = new THREE.Vector3(-cos * markerR, state.resultMax + 0.1, sin * markerR);
        const minPoint = new THREE.Vector3(cos * markerR, state.resultMax + 0.1, -sin * markerR);

        const slopeLineGeom = new THREE.BufferGeometry().setFromPoints([minPoint, maxPoint]);
        const slopeLineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 3 });
        slopeLine = new THREE.Line(slopeLineGeom, slopeLineMat);
        scene.add(slopeLine);

        const slopeSphereR = Math.max(state.D * 0.024, 0.2);
        const slopeSphereGeom = new THREE.SphereGeometry(slopeSphereR, 16, 16);
        const slopeSphereMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        slopeMaxMarker = new THREE.Mesh(slopeSphereGeom, slopeSphereMat);
        slopeMaxMarker.position.copy(maxPoint);
        scene.add(slopeMaxMarker);

        slopeMinMarker = new THREE.Mesh(slopeSphereGeom.clone(), slopeSphereMat);
        slopeMinMarker.position.copy(minPoint);
        scene.add(slopeMinMarker);
      }

      grid.scale.setScalar(Math.max(1, state.D / 100));

      if (!cameraInitialized) {
        recenterCamera(state);
        cameraInitialized = true;
      }
    }

    function recenterCamera(state) {
      const dist = Math.max(state.D, state.h1max || 1, state.h2max || 1) * 2.4;
      camera.position.set(0, dist, 0);
      camera.up.set(0, 0, 1);
      camera.lookAt(0, state.center * 0.5, 0);
      controls.target.set(0, state.center * 0.5, 0);
      controls.update();
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      if (w === 0 || h === 0) return;
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      // TrackballControls need to be told about size changes
      if (typeof controls.handleResize === 'function') controls.handleResize();
    }

    window.addEventListener('resize', resize);
    resize();

    document.addEventListener('wedge-updated', (e) => rebuild(e.detail));

    window.resetWedgeCamera = function () { cameraInitialized = false; };

    if (window.wedgeState && window.wedgeState.D) {
      rebuild(window.wedgeState);
    } else if (typeof window.requestWedgeUpdate === 'function') {
      window.requestWedgeUpdate();
    }

    // Recenter button — bird's-eye view from above with sup at 12, inf at 6
    const recenterBtn = document.getElementById('recenter-btn');
    if (recenterBtn) {
      recenterBtn.addEventListener('click', () => {
        const s = currentState || window.wedgeState;
        if (!s || !s.D) return;
        recenterCamera(s);
      });
    }

    const stlExporter = new STLExporter();

    // ─── DRILLING GUIDE ───────────────────────────────────────────────────
    const guideMaterial = new THREE.MeshLambertMaterial({
      color: 0x88aacc,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.35,
      depthWrite: false
    });

    let guideMesh = null;       // Guide A (main body)
    let plugMeshRef = null;     // Guide B (plug)
    let guideAVisible = false;
    let guideBVisible = false;
    let wedgeVisible = true;
    const toggleWedgeBtn = document.getElementById('toggle-wedge-btn');
    const toggleGuideABtn = document.getElementById('toggle-guide-a-btn');
    const toggleGuideBBtn = document.getElementById('toggle-guide-b-btn');

    function disposeGuide() {
      if (guideMesh) {
        scene.remove(guideMesh);
        guideMesh.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
        guideMesh = null;
      }
      if (plugMeshRef) {
        scene.remove(plugMeshRef);
        if (plugMeshRef.geometry) plugMeshRef.geometry.dispose();
        plugMeshRef = null;
      }
    }

    function buildDrillingGuide(state) {
      disposeGuide();
      if (!guideAVisible && !guideBVisible) return;

      const D = state.D;
      const r = D / 2;
      const rInner = r + 0.5; // D + 1mm clearance for bone cylinder
      const wallNorm = 3;
      const wallLip = 10;
      const lipLen = 5;
      const taperLen = 5;
      const rOuter = rInner + wallNorm;
      const rOuterLip = rInner + wallLip;
      const segs = 96;

      const mirrored = !!state.mirrored;
      const tanA1 = (state.h1max - state.h1min) / D;
      const tanA2 = (state.h2max - state.h2min) / D * (mirrored ? -1 : 1);
      const halfDiff = r * Math.sqrt(tanA1 * tanA1 + tanA2 * tanA2);
      const resultMax = state.center + halfDiff;

      // ── CUTTING BLOCK LAYOUT ──
      //
      // Wedge coordinate system:
      //   Flat top at y = resultMax
      //   Angled bottom: y(x,z) = resultMax - (center + tanA2·x + tanA1·z)
      //     → y=0 at thickest point, y=resultMax-resultMin at thinnest
      //
      // Cutting block wraps around wedge:
      //   BOTTOM: angled cut surface with LIP (saw guide, 10mm wall)
      //     Lip follows the angled plane for saw guidance
      //   MIDDLE: 30mm straight cylinder (3mm wall) above resultMax
      //   TOP: open rim (3mm wall, bone entry)
      //
      // The wedge sits inside: angled face at bottom, flat top at resultMax

      const guideHeight = 30;
      const slotW = 3;
      const slotAngHalf = Math.atan2(slotW / 2, rInner);
      // Slots align with resulting slope direction
      const slotTheta1 = Math.atan2(tanA1, tanA2); // resulting slope direction in 3D
      const slotTheta2 = slotTheta1 + Math.PI;     // 180° opposite
      function angDist(a, b) {
        let d = Math.abs(a - b) % (2 * Math.PI);
        return Math.min(d, 2 * Math.PI - d);
      }
      function isInSlot(theta) {
        return angDist(theta, slotTheta1) < slotAngHalf ||
               angDist(theta, slotTheta2) < slotAngHalf;
      }

      // ── CONCEPT ──
      // Wedge in 3D: flat top at y=resultMax, angled bottom face.
      // Angled bottom: cutY(x,z) = resultMax - (center + tanA2*x + tanA1*z)
      //   → y=0 at thickest point, y=(resultMax-resultMin) at thinnest
      //
      // Guide = tube for bone cylinder. Saw along angled bottom edge → wedge shape.
      //   Bottom edge = angled = cutY (matches wedge angled face exactly)
      //   Lip (10mm wall) at bottom edge for saw guidance (follows angle)
      //   30mm straight cylinder above resultMax
      //   Open top for bone insertion

      const cutY = (x, z) => resultMax - (state.center + tanA2 * x + tanA1 * z);
      const openTopY = resultMax + guideHeight;
      const deckY = resultMax - lipLen - taperLen; // compensate for position.y shift

      const guideGroup = new THREE.Group();
      const positions = [];
      const indices = [];

      // Grip: vertical flutes on outer wall, top 25mm
      const gripHeight = 25; // grip grooves length (original)
      const gripDepth = 0.8;
      const gripCount = 36;
      const gripStartY = openTopY - gripHeight;

      // 10 vertices per segment:
      // v0:  (rOuterLip, lipBot-fR)        lip bottom fillet start (below)
      // v1:  (rInner,    lipBot)            inner lip bottom
      // v2:  (rOuterLip-fR, lipBot)         lip bottom fillet end (side)
