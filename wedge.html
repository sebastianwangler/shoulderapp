      // v3:  (rOuterLip, lipTop)            lip/taper junction outer
      // v4:  (rInner,    lipTop)            lip/taper junction inner
      // v5:  (rOuter,    cutY)              cut surface outer
      // v6:  (rInner,    cutY)              cut surface inner
      // v7:  (rOuter+fR, cutY+fR)          taper→cyl fillet (corner)
      // v8:  (rOuter,    gripStartY)        grip zone start (smooth)
      // v9:  (rGrip,     gripStartY)        grip zone start (grip r)
      // v10: (rGrip,     openTopY-fR)       grip zone top before fillet
      // v11: (rGrip-fR,  openTopY)          top fillet end (horizontal)
      // v12: (rInner,    openTopY)           inner top
      // We'll use fillet intermediary rings separately.
      // Actually, simpler approach: keep VPS=10 but add fillet rings after main loop.

      const VPS = 12;
      const vi = (s, v) => s * VPS + v;

      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        const c = Math.cos(th), sn = Math.sin(th);
        const xi = rInner * c, zi = rInner * sn;
        const xo = rOuter * c, zo = rOuter * sn;
        const xol = rOuterLip * c, zol = rOuterLip * sn;
        const cO = cutY(xo, zo), cI = cutY(xi, zi), cL = cutY(xol, zol);

        const gripPhase = (s / segs) * gripCount;
        const inGroove = (Math.floor(gripPhase) % 2 === 0);
        const rGrip = inGroove ? rOuter - gripDepth : rOuter;

        positions.push(xol, cL - lipLen - taperLen + 1, zol);  // v0: lip bottom outer (1mm up for fillet)
        positions.push(xi,  cI - lipLen - taperLen + 1, zi);    // v1: lip bottom inner (1mm up, chamfer below)
        positions.push(xol, cL - taperLen,          zol);   // v2: lip/taper junction outer
        positions.push(xi,  cI - taperLen,          zi);    // v3: lip/taper junction inner
        positions.push(xo,  cO,                     zo);    // v4: cut surface outer
        positions.push(xi,  cI,                     zi);    // v5: cut surface inner
        positions.push(rGrip * c, openTopY - 1, rGrip * sn);   // v6: top outer before fillet
        positions.push(xi,  openTopY - 1,               zi);    // v7: top inner before fillet
        positions.push(xo,  gripStartY,             zo);    // v8: grip zone start (smooth r)
        positions.push(rGrip * c, gripStartY, rGrip * sn); // v9: grip zone start (grip r)
        positions.push(xi,  openTopY - 5,               zi);    // v10: inner slot stop (5mm before top)
        positions.push(rGrip * c, openTopY - 5, rGrip * sn);   // v11: outer slot stop (5mm before top)
      }

      const fR = 1.0;
      const fN = 5;
      function connectR(bA, bB, faceOut) {
        for (let s = 0; s < segs; s++) {
          const ns = (s + 1) % segs;
          if (faceOut) {
            indices.push(bA+s, bA+ns, bB+ns); indices.push(bA+s, bB+ns, bB+s);
          } else {
            indices.push(bA+s, bB+s, bB+ns); indices.push(bA+s, bB+ns, bA+ns);
          }
        }
      }

      // ── Bottom lip fillet (outer, 1mm radius) ──
      const botFilletOuter = [];
      for (let fi = 0; fi <= fN; fi++) {
        const a = (Math.PI / 2) * (fi / fN); // 0=wall side, PI/2=bottom
        const base = positions.length / 3;
        for (let s = 0; s < segs; s++) {
          const th = (s / segs) * Math.PI * 2;
          const c = Math.cos(th), sn = Math.sin(th);
          const xol = rOuterLip * c, zol = rOuterLip * sn;
          const cL = cutY(xol, zol);
          // Center of fillet arc at (rOuterLip - fR, lipBot + fR) where lipBot = cL - lipLen - taperLen
          const rF = (rOuterLip - fR) + fR * Math.cos(a);
          const yF = (cL - lipLen - taperLen + fR) - fR * Math.sin(a);
          positions.push(rF * c, yF, rF * sn);
        }
        botFilletOuter.push(base);
      }

      // v0 → first bottom fillet ring (slot-aware)
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2, thN = (ns / segs) * Math.PI * 2;
        if (isInSlot(thS) && isInSlot(thN)) continue;
        indices.push(vi(s,0), vi(ns,0), botFilletOuter[0]+ns);
        indices.push(vi(s,0), botFilletOuter[0]+ns, botFilletOuter[0]+s);
      }
      for (let i = 0; i < botFilletOuter.length - 1; i++) connectRSlot(botFilletOuter[i], botFilletOuter[i+1], true);
      // Inner bottom chamfer
      const chamferBase = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        const c = Math.cos(th), sn = Math.sin(th);
        const xi = rInner * c, zi = rInner * sn;
        const cI = cutY(xi, zi);
        positions.push((rInner + 1) * c, cI - lipLen - taperLen, (rInner + 1) * sn);
      }
      const botLast = botFilletOuter[botFilletOuter.length - 1];
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2, thN = (ns / segs) * Math.PI * 2;
        if (isInSlot(thS) && isInSlot(thN)) continue;
        indices.push(botLast+s, botLast+ns, chamferBase+ns);
        indices.push(botLast+s, chamferBase+ns, chamferBase+s);
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2, thN = (ns / segs) * Math.PI * 2;
        if (isInSlot(thS) && isInSlot(thN)) continue;
        indices.push(chamferBase+s, chamferBase+ns, vi(ns,1));
        indices.push(chamferBase+s, vi(ns,1), vi(s,1));
      }

      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2;
        const thN = (ns / segs) * Math.PI * 2;
        const inSlotS = isInSlot(thS); // check at y=0 (below slotTopY)
        const inSlotN = isInSlot(thN);

        // LIP/TAPER: skip if in slot zone (slots cut toward cut surface)
        if (!inSlotS || !inSlotN) {
          // LIP outer v0→v2
          indices.push(vi(s,0),vi(ns,0),vi(ns,2)); indices.push(vi(s,0),vi(ns,2),vi(s,2));
          // LIP inner v1→v3
          indices.push(vi(s,1),vi(s,3),vi(ns,3)); indices.push(vi(s,1),vi(ns,3),vi(ns,1));
          // TAPER inner v3→v5
          indices.push(vi(s,3),vi(s,5),vi(ns,5)); indices.push(vi(s,3),vi(ns,5),vi(ns,3));
        }

        // CYLINDER outer: v8→v9→v11 (slot-aware), v11→v6 (always present)
        if (!inSlotS || !inSlotN) {
          indices.push(vi(s,8),vi(ns,8),vi(ns,9)); indices.push(vi(s,8),vi(ns,9),vi(s,9));
          indices.push(vi(s,9),vi(ns,9),vi(ns,11)); indices.push(vi(s,9),vi(ns,11),vi(s,11));
        }
        indices.push(vi(s,11),vi(ns,11),vi(ns,6)); indices.push(vi(s,11),vi(ns,6),vi(s,6));
        // CYLINDER inner: v5→v10 (slot-aware), v10→v7 (always present)
        if (!inSlotS || !inSlotN) {
          indices.push(vi(s,5),vi(s,10),vi(ns,10)); indices.push(vi(s,5),vi(ns,10),vi(ns,5));
        }
        indices.push(vi(s,10),vi(s,7),vi(ns,7)); indices.push(vi(s,10),vi(ns,7),vi(ns,10));
      }

      // ── Slot end caps: close the slot openings with solid faces ──
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2;
        const thN = (ns / segs) * Math.PI * 2;
        const inS = isInSlot(thS), inN = isInSlot(thN);

        // Slot top cap: horizontal face at v10→v11 (closing slot top)
        if (inS && inN) {
          indices.push(vi(s,10), vi(ns,10), vi(ns,11));
          indices.push(vi(s,10), vi(ns,11), vi(s,11));
        }

        // Side wall at slot edge: where one segment is in slot and next is not
        if (inS && !inN) {
          indices.push(vi(ns,5), vi(ns,8), vi(ns,11));
          indices.push(vi(ns,5), vi(ns,11), vi(ns,10));
        }
        if (!inS && inN) {
          indices.push(vi(s,5), vi(s,10), vi(s,11));
          indices.push(vi(s,5), vi(s,11), vi(s,8));
        }
      }

      // ── Taper→Cylinder fillet (concave, 1mm, between v4 and v8) ──
      // Adds material to smooth the inside corner at v4 (rOuter, cutY)
      // Quarter circle from v4 upward, bulging outward, then straight to v8
      // Taper+Fillet: smooth curve from v2 (rOuterLip, lipTop) to v8 (rOuter, gripStartY)
      // Replaces the straight taper v2→v4 and the v4→v8 connection
      // Quadratic radius fade from rOuterLip down to rOuter
      const tcfRings = [];
      const bulge = rOuterLip - rOuter;
      for (let fi = 0; fi <= fN * 2; fi++) {
        const t = fi / (fN * 2); // 0→1, more steps for smooth curve
        const base = positions.length / 3;
        for (let s = 0; s < segs; s++) {
          const th = (s / segs) * Math.PI * 2;
          const c = Math.cos(th), sn = Math.sin(th);
          const xol = rOuterLip * c, zol = rOuterLip * sn;
          const xo = rOuter * c, zo = rOuter * sn;
          const cL = cutY(xol, zol);
          const cO = cutY(xo, zo);
          // Radius: smooth curve from rOuterLip to rOuter
          // Use sin² for smooth tangential start (vertical at t=0, then curves inward)
          const tCurve = Math.sin(t * Math.PI / 2); // 0→1, starts slow (tangent to vertical)
          const rF = rOuterLip - bulge * tCurve * tCurve;
          // Y: interpolate from v2 Y (cL - taperLen) to gripStartY
          const yStart = cL - taperLen; // v2 Y (per segment, follows cut angle)
          const yEnd = gripStartY;       // v8 Y (constant)
          const yF = yStart + (yEnd - yStart) * t;
          positions.push(rF * c, yF, rF * sn);
        }
        tcfRings.push(base);
      }
      // v2 → first tcf ring (slot-aware)
      function connectRSlot(bA, bB, faceOut) {
        for (let s = 0; s < segs; s++) {
          const ns = (s + 1) % segs;
          const thS2 = (s / segs) * Math.PI * 2;
          const thN2 = (ns / segs) * Math.PI * 2;
          if (isInSlot(thS2) && isInSlot(thN2)) continue;
          if (faceOut) {
            indices.push(bA+s, bA+ns, bB+ns); indices.push(bA+s, bB+ns, bB+s);
          } else {
            indices.push(bA+s, bB+s, bB+ns); indices.push(bA+s, bB+ns, bA+ns);
          }
        }
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2;
        const thN = (ns / segs) * Math.PI * 2;
        if (isInSlot(thS) && isInSlot(thN)) continue;
        indices.push(vi(s,2), vi(ns,2), tcfRings[0]+ns);
        indices.push(vi(s,2), tcfRings[0]+ns, tcfRings[0]+s);
      }
      for (let i = 0; i < tcfRings.length - 1; i++) connectRSlot(tcfRings[i], tcfRings[i+1], true);
      const tcfLast = tcfRings[tcfRings.length - 1];
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        const thS = (s / segs) * Math.PI * 2;
        const thN = (ns / segs) * Math.PI * 2;
        if (isInSlot(thS) && isInSlot(thN)) continue;
        indices.push(tcfLast+s, tcfLast+ns, vi(ns,8));
        indices.push(tcfLast+s, vi(ns,8), vi(s,8));
      }

      // ── Top edge chamfers (1mm, outer + inner) ──
      const chTopOuter = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        const c = Math.cos(th), sn = Math.sin(th);
        const gripPhase = (s / segs) * gripCount;
        const inGroove = (Math.floor(gripPhase) % 2 === 0);
        const rGrip2 = inGroove ? rOuter - gripDepth : rOuter;
        positions.push((rGrip2 - 1) * c, openTopY, (rGrip2 - 1) * sn);
      }
      const chTopInner = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        const c = Math.cos(th), sn = Math.sin(th);
        positions.push(rInner * c, openTopY, rInner * sn); // sharp 90° edge, no chamfer
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(vi(s,6), vi(ns,6), chTopOuter+ns);
        indices.push(vi(s,6), chTopOuter+ns, chTopOuter+s);
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(vi(s,7), chTopInner+s, chTopInner+ns);
        indices.push(vi(s,7), chTopInner+ns, vi(ns,7));
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(chTopInner+s, chTopOuter+s, chTopOuter+ns);
        indices.push(chTopInner+s, chTopOuter+ns, chTopInner+ns);
      }

      // ── Close Guide A inner hole with 2mm thick disc ──
      // Disc spans from center to rInner, sitting on top of the existing opening
      const capThick = 2;
      const capOffset = -2; // 2mm below guide top (into the guide)
      const capHoleR = r - 2; // hole diameter = D - 4mm
      const capYBot = openTopY + capOffset;
      const capYTop = capYBot + capThick;
      const capCh = 0.3;
      // Bottom face: annulus from capHoleR+capCh to rInner (faces down)
      const capBotOuter = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push(rInner * Math.cos(th), capYBot, rInner * Math.sin(th));
      }
      const capBotInner = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push((capHoleR + capCh) * Math.cos(th), capYBot, (capHoleR + capCh) * Math.sin(th));
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capBotOuter + s, capBotInner + s, capBotInner + ns);
        indices.push(capBotOuter + s, capBotInner + ns, capBotOuter + ns);
      }
      // Top face: annulus from capHoleR+capCh to rInner (faces up)
      const capTopOuter = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push(rInner * Math.cos(th), capYTop, rInner * Math.sin(th));
      }
      const capTopInner = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push((capHoleR + capCh) * Math.cos(th), capYTop, (capHoleR + capCh) * Math.sin(th));
      }
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capTopOuter + s, capTopOuter + ns, capTopInner + ns);
        indices.push(capTopOuter + s, capTopInner + ns, capTopInner + s);
      }
      // Outer wall (straight, capBotOuter → capTopOuter at rInner)
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capBotOuter + s, capTopOuter + s, capTopOuter + ns);
        indices.push(capBotOuter + s, capTopOuter + ns, capBotOuter + ns);
      }
      // Inner wall with 0.3mm chamfer on both edges (at capHoleR)
      const capInWallBot = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push(capHoleR * Math.cos(th), capYBot + capCh, capHoleR * Math.sin(th));
      }
      const capInWallTop = positions.length / 3;
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        positions.push(capHoleR * Math.cos(th), capYTop - capCh, capHoleR * Math.sin(th));
      }
      // Bottom chamfer (capBotInner at capHoleR+0.3 → capInWallBot at capHoleR)
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capBotInner + s, capBotInner + ns, capInWallBot + ns);
        indices.push(capBotInner + s, capInWallBot + ns, capInWallBot + s);
      }
      // Straight inner wall (capInWallBot → capInWallTop)
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capInWallBot + s, capInWallBot + ns, capInWallTop + ns);
        indices.push(capInWallBot + s, capInWallTop + ns, capInWallTop + s);
      }
      // Top chamfer (capInWallTop at capHoleR → capTopInner at capHoleR+0.3)
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        indices.push(capInWallTop + s, capInWallTop + ns, capTopInner + ns);
        indices.push(capInWallTop + s, capTopInner + ns, capTopInner + s);
      }

      const mainGeom = new THREE.BufferGeometry();
      mainGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      mainGeom.setIndex(indices);
      mainGeom.computeVertexNormals();
      guideGroup.add(new THREE.Mesh(mainGeom, guideMaterial));

      // ── Patient ID text on Guide A sockel outside ──
      const gSidePrefix = (window.wedgeSide === 'left' ? 'L' : 'R') + '-';
      const gRawPatId = (document.getElementById('pat-id') && document.getElementById('pat-id').value || '').trim();
      const patIdG = gSidePrefix + (gRawPatId || '');
      if (loadedFont) {
        const gTextGeom = new TextGeometry(patIdG, {
          font: loadedFont,
          size: 3.2,
          height: 0.5,
          depth: 0.5,
          curveSegments: 3,
          bevelEnabled: false
        });
        gTextGeom.computeBoundingBox();
        const bb = gTextGeom.boundingBox;
        const tw = bb.max.x - bb.min.x;
        const th = bb.max.y - bb.min.y;

        // Bend text around cylinder AND follow wedge angle
        const posAttr = gTextGeom.getAttribute('position');

        // Place text centered between slots, ensure it doesn't overlap them
        // Slots are at slotTheta1 and slotTheta2 (180° apart)
        const textAngularW = tw / rOuterLip; // angular width of text on cylinder
        const slotClearance = slotAngHalf + 0.05; // angular clearance from slot edges
        const availableArc = Math.PI - 2 * slotClearance; // available arc between two slots
        // Center text in available arc; if too wide, use the opposite side
        let textStartAngle = slotTheta1 + Math.PI / 2; // 90° from first slot (centered between slots)
        if (textAngularW > availableArc) {
          // Try the other side (opposite 180° arc)
          textStartAngle = slotTheta1 - Math.PI / 2;
        }

        for (let i = 0; i < posAttr.count; i++) {
          const x = posAttr.getX(i); // along text width → angle on cylinder
          const y = posAttr.getY(i); // text height → height offset along lip
          const z = posAttr.getZ(i); // text depth → radial offset

          // Map x to angle around cylinder, centered at textStartAngle
          const angle = textStartAngle + (x - tw / 2) / rOuterLip;
          const rr = rOuterLip + z;

          // World position on cylinder
          const wx = rr * Math.sin(angle);
          const wz = rr * Math.cos(angle);

          // cutY at this angular position follows the wedge slope
          const cutAtAngle = cutY(rOuterLip * Math.sin(angle), rOuterLip * Math.cos(angle));
          // Lip center Y at this angle (follows the angled cut surface)
          const lipMidAtAngle = cutAtAngle - lipLen * 0.5 - taperLen;

          posAttr.setX(i, wx);
          posAttr.setY(i, y + lipMidAtAngle - th / 2 + 1); // shifted 1mm toward top
          posAttr.setZ(i, wz);
        }
        posAttr.needsUpdate = true;
        gTextGeom.computeVertexNormals();

        const gTextMesh = new THREE.Mesh(gTextGeom, guideMaterial);
        guideGroup.add(gTextMesh);
      }

      // ── PLUG (separate insertable solid cylinder) ──
      // Outer Ø = D, solid (no hollow), with chamfered outer edges
      const plugPos = [];
      const plugIdx = [];
      const plugROuter = r;
      const chP = 1; // chamfer size

      const plugTopY = openTopY - 2; // Guide B 2mm shorter
      for (let s = 0; s < segs; s++) {
        const th = (s / segs) * Math.PI * 2;
        const c = Math.cos(th), sn = Math.sin(th);
        plugPos.push(plugROuter * c,         deckY + chP,    plugROuter * sn);  // p0: outer bot (1mm up)
        plugPos.push(plugROuter * c,         plugTopY - chP, plugROuter * sn);  // p1: outer top (1mm down)
        plugPos.push((plugROuter - chP) * c, deckY,          (plugROuter - chP) * sn); // p2: bot chamfer
        plugPos.push((plugROuter - chP) * c, plugTopY,       (plugROuter - chP) * sn); // p3: top chamfer
      }
      const pv = (s, v) => s * 4 + v;
      for (let s = 0; s < segs; s++) {
        const ns = (s + 1) % segs;
        // Outer wall p0→p1
        plugIdx.push(pv(s,0), pv(ns,0), pv(ns,1)); plugIdx.push(pv(s,0), pv(ns,1), pv(s,1));
        // Bottom chamfer p2→p0
        plugIdx.push(pv(s,2), pv(ns,2), pv(ns,0)); plugIdx.push(pv(s,2), pv(ns,0), pv(s,0));
        // Top chamfer p1→p3
        plugIdx.push(pv(s,1), pv(ns,1), pv(ns,3)); plugIdx.push(pv(s,1), pv(ns,3), pv(s,3));
      }
      // Bottom solid disc (center → p2 chamfer ring, faces down)
      const plugBotC = plugPos.length / 3;
      plugPos.push(0, deckY, 0);
      for (let s = 0; s < segs; s++) {
        plugIdx.push(plugBotC, pv((s+1)%segs, 2), pv(s, 2));
      }
      // Top solid disc (center → p3 chamfer ring, faces up)
      const plugTopC = plugPos.length / 3;
      plugPos.push(0, plugTopY, 0);
      for (let s = 0; s < segs; s++) {
        plugIdx.push(plugTopC, pv(s, 3), pv((s+1)%segs, 3));
      }

      const plugGeom = new THREE.BufferGeometry();
      plugGeom.setAttribute('position', new THREE.Float32BufferAttribute(plugPos, 3));
      plugGeom.setIndex(plugIdx);
      plugGeom.computeVertexNormals();
      // Make plug a group so we can add text
      const plugGroup = new THREE.Group();
      plugGroup.add(new THREE.Mesh(plugGeom, guideMaterial));

      // ── Patient ID + "outside" text on Guide B top face ──
      const bSidePrefix = (window.wedgeSide === 'left' ? 'L' : 'R') + '-';
      const bRawPatId = (document.getElementById('pat-id') && document.getElementById('pat-id').value || '').trim();
      const patIdB = bSidePrefix + (bRawPatId || '');
      if (loadedFont) {
        let bFontSize = 3.2;
        const bMargin = 3; // 3mm margin from edge
        const bAvailW = (plugROuter - bMargin) * 2; // available diameter minus margins
        const bAvailH = (plugROuter - bMargin) * 2; // available height for lines

        // Measure text width at given font size
        function measureBW(text, sz) {
          const tg = new TextGeometry(text, {
            font: loadedFont, size: sz, height: 0.5, depth: 0.5,
            curveSegments: 3, bevelEnabled: false
          });
          tg.computeBoundingBox();
          const w = tg.boundingBox.max.x - tg.boundingBox.min.x;
          tg.dispose();
          return w;
        }

        // Shrink font until text fits (min 1.5mm)
        while (bFontSize > 1.5 && measureBW(patIdB, bFontSize) > bAvailW) {
          bFontSize -= 0.1;
        }

        // If still too wide, split into lines
        {
          function fitTextB(text, maxW) {
            if (measureBW(text, bFontSize) <= maxW) return [text];
            const nL = Math.ceil(measureBW(text, bFontSize) / maxW);
            const cpl = Math.floor(text.length / nL);
            const lines = [];
            for (let i = 0; i < text.length; i += cpl) lines.push(text.substring(i, i + cpl));
            return lines;
          }

          const bLines = fitTextB(patIdB, bAvailW);
          const bLineH = bFontSize * 1.4;
          // Check total text height doesn't exceed available area
          const totalTextH = bLines.length * bLineH;
          if (totalTextH > bAvailH && bFontSize > 1.5) {
            bFontSize = Math.max(1.5, bFontSize * bAvailH / totalTextH);
          }
          for (let li = 0; li < bLines.length; li++) {
            const lm = createTextRelief(bLines[li], bFontSize, 0.5, guideMaterial);
            if (lm) {
              const bb = lm.geometry.boundingBox;
              const tw = bb.max.x - bb.min.x;
              const zOff = (li - (bLines.length - 1) / 2) * bLineH;
              lm.rotation.x = -Math.PI / 2;
              lm.position.set(-tw / 2, plugTopY + 0.01, zOff);
              plugGroup.add(lm);
            }
          }
        }

      }

      plugMeshRef = plugGroup;
      plugMeshRef.renderOrder = 1;

      // Add to scene in circle arrangement
      // Guide A is larger (lip radius rOuterLip = r + 10.15), Guide B is smaller (r).
      // Place them so the gap between each pair of parts is equal.
      var rA = r + 10.15; // Guide A effective radius (lip)
      var rB = r;         // Guide B effective radius
      var rW0 = r;        // Wedge effective radius
      var gap = 4;        // desired gap between parts
      // Distance from wedge(origin) to Guide A center: rW0 + gap + rA
      var distA = rW0 + gap + rA;
      // Distance from wedge(origin) to Guide B center: rW0 + gap + rB
      var distB = rW0 + gap + rB;
      // Angle between Guide A and Guide B: ensure gap between them too
      // Distance between A and B centers must be >= rA + gap + rB
      var distAB = rA + gap + rB;
      // Use law of cosines to find the angle between them: c² = a² + b² - 2ab·cos(θ)
      var cosAngAB = (distA * distA + distB * distB - distAB * distAB) / (2 * distA * distB);
      cosAngAB = Math.max(-1, Math.min(1, cosAngAB)); // clamp
      var angBetween = Math.acos(cosAngAB);
      // Place Guide A and B symmetrically below wedge (clockwise and counterclockwise)
      var angCenter = Math.PI; // both guides go "below" the wedge (180° = negative X)
      var ang1 = angCenter - angBetween / 2; // Guide A: clockwise from center
      var ang2 = angCenter + angBetween / 2; // Guide B: counterclockwise
      var circR = distA; // Guide A distance
      var circRB = distB; // Guide B distance
      // Position guides so their lowest point matches wedge lowest point (y=0)
      // First add to scene, then measure bounds and adjust
      guideGroup.rotation.z = Math.PI;
      guideGroup.renderOrder = 1;
      guideMesh = guideGroup;

      // Temporarily add to compute bounds
      scene.add(guideGroup);
      scene.add(plugMeshRef);
      guideGroup.updateMatrixWorld(true);
      plugMeshRef.updateMatrixWorld(true);

      // Find lowest Y of Guide A
      var minYA = Infinity;
      guideGroup.traverse(function(c) {
        if (c.isMesh && c.geometry) {
          var pos = c.geometry.getAttribute('position');
          if (!pos) return;
          var wp = new THREE.Vector3();
          for (var i = 0; i < pos.count; i++) {
            wp.set(pos.getX(i), pos.getY(i), pos.getZ(i));
            c.localToWorld(wp);
            if (wp.y < minYA) minYA = wp.y;
          }
        }
      });

      // Find lowest Y of Guide B
      var minYB = Infinity;
      plugMeshRef.traverse(function(c) {
        if (c.isMesh && c.geometry) {
          var pos = c.geometry.getAttribute('position');
          if (!pos) return;
          var wp = new THREE.Vector3();
          for (var i = 0; i < pos.count; i++) {
            wp.set(pos.getX(i), pos.getY(i), pos.getZ(i));
            c.localToWorld(wp);
            if (wp.y < minYB) minYB = wp.y;
          }
        }
      });

      scene.remove(guideGroup);
      scene.remove(plugMeshRef);

      // Set positions: shift Y so lowest point = 0
      guideGroup.position.set(distA * Math.cos(ang1), -minYA, distA * Math.sin(ang1));
      plugMeshRef.position.set(distB * Math.cos(ang2), -minYB, distB * Math.sin(ang2));

      if (guideAVisible) scene.add(guideMesh);
      if (guideBVisible) scene.add(plugMeshRef);
    }

    // Toggle button styling helper
    function setToggleStyle(btn, active) {
      if (active) {
        btn.style.background = '#1a1a1a'; btn.style.color = '#fff'; btn.style.borderColor = '#1a1a1a';
      } else {
        btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
      }
    }

    // Wedge toggle
    toggleWedgeBtn.addEventListener('click', () => {
      wedgeVisible = !wedgeVisible;
      if (wedgeMesh) wedgeMesh.visible = wedgeVisible;
      if (wedgeEdges) wedgeEdges.visible = wedgeVisible;
      // Hide/show markers, labels, slope line
      for (const m of markers) m.visible = wedgeVisible;
      for (const l of labels) l.visible = wedgeVisible;
      if (slopeLine) slopeLine.visible = wedgeVisible;
      if (slopeMaxMarker) slopeMaxMarker.visible = wedgeVisible;
      if (slopeMinMarker) slopeMinMarker.visible = wedgeVisible;
      setToggleStyle(toggleWedgeBtn, wedgeVisible);
      if (wedgeVisible) { toggleWedgeBtn.style.background = '#87CEEB'; toggleWedgeBtn.style.borderColor = '#87CEEB'; toggleWedgeBtn.style.color = '#333'; }
    });

    // Apply support lift offset to guides if supports are active
    function applySupportLift() {
      if (!supportPreviewGroup) return;
      const lift = 4 + 1.5; // liftH + raftH2
      if (guideMesh) guideMesh.position.y += lift;
      if (plugMeshRef) plugMeshRef.position.y += lift;
    }

    // Guide A toggle
    toggleGuideABtn.addEventListener('click', () => {
      guideAVisible = !guideAVisible;
      setToggleStyle(toggleGuideABtn, guideAVisible);
      const s = currentState || window.wedgeState;
      if (s && s.D) {
        if (guideAVisible || guideBVisible) buildDrillingGuide(s);
        else disposeGuide();
      }
      applySupportLift();
      if (guideMesh) guideMesh.visible = guideAVisible;
    });

    // Guide B toggle
    toggleGuideBBtn.addEventListener('click', () => {
      guideBVisible = !guideBVisible;
      setToggleStyle(toggleGuideBBtn, guideBVisible);
      const s = currentState || window.wedgeState;
      if (s && s.D) {
        if (guideAVisible || guideBVisible) buildDrillingGuide(s);
        else disposeGuide();
      }
      applySupportLift();
      if (plugMeshRef) plugMeshRef.visible = guideBVisible;
    });

    // Rebuild guide when wedge updates (if visible)
    document.addEventListener('wedge-updated', (e) => {
      if (guideAVisible || guideBVisible) buildDrillingGuide(e.detail);
      // Hide supports during update, show again after rebuild
      if (supportPreviewGroup) supportPreviewGroup.visible = false;
      if (document.getElementById('chk-supports').checked) {
        setTimeout(() => {
          if (supportPreviewGroup) {
            scene.remove(supportPreviewGroup);
            supportPreviewGroup = null;
          }
          document.getElementById('chk-supports').dispatchEvent(new Event('change'));
        }, 1200);
      }
    });

    // ── Support structure generation ──
    let supportPreviewGroup = null;
    const supportMaterial = new THREE.MeshLambertMaterial({ color: 0xffcc00, transparent: true, opacity: 0.6 });

    function generateSupports(targetScene, raftCenter) {
      const supportPillarR = 0.25, contactR = 0.15, contactH = 0.5;
      const raftH = 0.8, raftMargin = 2;
      const overhangAngle = 40, gridSpacing = 2.5, minSupportH = 1.0;
      const cosThreshold = Math.cos((90 - overhangAngle) * Math.PI / 180);

      const tris = [];
      let minY = Infinity, maxY = -Infinity, minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;

      targetScene.traverse(child => {
        if (!child.isMesh || !child.geometry) return;
        const pos = child.geometry.getAttribute('position');
        const idx = child.geometry.getIndex();
        if (!pos || !idx) return;
        for (let f = 0; f < idx.count; f += 3) {
          const vs = [];
          for (let v = 0; v < 3; v++) {
            const i = idx.array[f + v];
            vs.push(new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)));
            minY = Math.min(minY, pos.getY(i)); maxY = Math.max(maxY, pos.getY(i));
            minX = Math.min(minX, pos.getX(i)); maxX = Math.max(maxX, pos.getX(i));
            minZ = Math.min(minZ, pos.getZ(i)); maxZ = Math.max(maxZ, pos.getZ(i));
          }
          const n = vs[1].clone().sub(vs[0]).cross(vs[2].clone().sub(vs[0])).normalize();
          tris.push({ n, c: vs[0].clone().add(vs[1]).add(vs[2]).divideScalar(3) });
        }
      });
      if (tris.length === 0) return null;

      const overhangPts = [];
      for (const t of tris) {
        if (t.n.y < -cosThreshold && t.c.y > minY + minSupportH) overhangPts.push(t.c.clone());
      }
      if (overhangPts.length === 0) return null;

      const grid = new Map();
      for (const p of overhangPts) {
        const k = Math.round(p.x / gridSpacing) + ',' + Math.round(p.z / gridSpacing);
        if (!grid.has(k) || p.y < grid.get(k).y) grid.set(k, p);
      }

      const rc = new THREE.Raycaster();
      const meshes = []; targetScene.traverse(c => { if (c.isMesh) meshes.push(c); });
      const group = new THREE.Group();

      for (const [, pt] of grid) {
        rc.set(new THREE.Vector3(pt.x, pt.y - 0.1, pt.z), new THREE.Vector3(0, -1, 0));
        const hits = rc.intersectObjects(meshes);
        let baseY = minY;
        for (const h of hits) { if (h.point.y < pt.y - minSupportH) { baseY = h.point.y; break; } }
        const pH = pt.y - baseY - contactH;
        if (pH < minSupportH) continue;

        const pg = new THREE.CylinderGeometry(supportPillarR, supportPillarR, pH, 6);
        const pm = new THREE.Mesh(pg); pm.position.set(pt.x, baseY + pH / 2, pt.z);
        pm.updateMatrix(); pg.applyMatrix4(pm.matrix);
        group.add(new THREE.Mesh(pg, supportMaterial.clone()));

        const tg = new THREE.CylinderGeometry(contactR, supportPillarR, contactH, 6);
        const tm = new THREE.Mesh(tg); tm.position.set(pt.x, baseY + pH + contactH / 2, pt.z);
        tm.updateMatrix(); tg.applyMatrix4(tm.matrix);
        group.add(new THREE.Mesh(tg, supportMaterial.clone()));

        const bg = new THREE.CylinderGeometry(supportPillarR * 2.5, supportPillarR * 2.5, 0.3, 6);
        const bm = new THREE.Mesh(bg); bm.position.set(pt.x, baseY + 0.15, pt.z);
        bm.updateMatrix(); bg.applyMatrix4(bm.matrix);
        group.add(new THREE.Mesh(bg, supportMaterial.clone()));
      }

      // Raft (round) centered on triangle centroid of the 3 parts
      const raftCX = raftCenter ? raftCenter.x : (minX + maxX) / 2;
      const raftCZ = raftCenter ? raftCenter.z : (minZ + maxZ) / 2;
      // Radius = max distance from centroid to any bounding box corner + margin
      const corners = [
        [minX, minZ], [minX, maxZ], [maxX, minZ], [maxX, maxZ]
      ];
      const raftRadius = Math.max(...corners.map(([cx, cz]) =>
        Math.sqrt((cx - raftCX) ** 2 + (cz - raftCZ) ** 2)
      )) + raftMargin;
      const rg = new THREE.CylinderGeometry(raftRadius, raftRadius, raftH, 64);
      const rm = new THREE.Mesh(rg); rm.position.set(raftCX, minY - raftH/2, raftCZ);
      rm.updateMatrix(); rg.applyMatrix4(rm.matrix);
      group.add(new THREE.Mesh(rg, supportMaterial.clone()));

      console.log(`Generated ${grid.size} support pillars + raft`);
      return group;
    }

    // Support preview
    document.getElementById('chk-supports').addEventListener('change', () => { try {
      if (supportPreviewGroup) {
        scene.remove(supportPreviewGroup); supportPreviewGroup = null;
        // Shift parts back down
        const dropY = 4 + 1.5; // liftH + raftH2
        if (wedgeMesh) wedgeMesh.position.y -= dropY;
        if (wedgeEdges) wedgeEdges.position.y -= dropY;
        if (guideMesh) guideMesh.position.y -= dropY;
        if (plugMeshRef) plugMeshRef.position.y -= dropY;
        for (const m of markers) m.position.y -= dropY;
        if (slopeLine) slopeLine.position.y -= dropY;
        if (slopeMaxMarker) slopeMaxMarker.position.y -= dropY;
        if (slopeMinMarker) slopeMinMarker.position.y -= dropY;
      }
      if (!document.getElementById('chk-supports').checked) return;
      const s = currentState || window.wedgeState;
      if (!s || !s.D) return;

      // Manual supports: pillars under wedge angled bottom + handle
      if (!wedgeMesh) rebuild(s);
      // Ensure guides are built (needed for raycasting support heights)
      if (!guideMesh || !plugMeshRef) {
        const wasA = guideAVisible, wasB = guideBVisible;
        guideAVisible = true; guideBVisible = true;
        buildDrillingGuide(s);
        guideAVisible = wasA; guideBVisible = wasB;
      }
      supportPreviewGroup = new THREE.Group();

      const supR = 0.4; // 0.8mm diameter
      const cTipR = 0.15; // 0.3mm contact diameter
      const cTipH = 0.8;
      const raftH2 = 1.5; // 1.5mm raft thickness
      const gridStep = 3;
      const liftH = 4; // 4mm lift above raft
      const upVec = new THREE.Vector3(0, 1, 0);
      const rW = s.D / 2;
      const tanA1s = (s.h1max - s.h1min) / s.D;
      const tanA2s = (s.h2max - s.h2min) / s.D * (s.mirrored ? -1 : 1);
      const halfDiffs = rW * Math.sqrt(tanA1s*tanA1s + tanA2s*tanA2s);
      const resMax = s.center + halfDiffs;

      function angYs(x, z) { return resMax - (s.center + tanA2s*x + tanA1s*z); }

      // ~25 supports: outer ring (16) + inner ring (6) + center (1) + 2 extra
      const supportPoints = [];

      // Outer ring: 16 supports along the circle edge
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2;
        supportPoints.push({ x: (rW - 1) * Math.cos(a), z: (rW - 1) * Math.sin(a) });
      }
      // Inner ring: 6 supports at half radius
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + Math.PI / 6; // offset 30°
        supportPoints.push({ x: (rW * 0.5) * Math.cos(a), z: (rW * 0.5) * Math.sin(a) });
      }
      // No center support (hole is there)

      const baseY = -liftH;
      for (const sp of supportPoints) {
        const sy = angYs(sp.x, sp.z);
        const totalH = sy + liftH;
        if (totalH < 1) continue;
        const pH = totalH - cTipH + 0.05;
        if (pH < 0.5) continue;

        const pg = new THREE.CylinderGeometry(supR, supR, pH, 6);
        const pm = new THREE.Mesh(pg); pm.position.set(sp.x, baseY + pH/2, sp.z);
        pm.updateMatrix(); pg.applyMatrix4(pm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(pg, supportMaterial.clone()));

        const tg = new THREE.CylinderGeometry(cTipR, supR, cTipH, 6);
        const tm = new THREE.Mesh(tg); tm.position.set(sp.x, baseY + pH + cTipH/2, sp.z);
        tm.updateMatrix(); tg.applyMatrix4(tm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(tg, supportMaterial.clone()));

        const bg = new THREE.CylinderGeometry(supR*2, supR*2, 0.3, 6);
        const bm = new THREE.Mesh(bg); bm.position.set(sp.x, baseY + 0.15, sp.z);
        bm.updateMatrix(); bg.applyMatrix4(bm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(bg, supportMaterial.clone()));
      }

      // One handle support: straight vertical, contact at outermost point of dome
      // Position the support X/Z so it clears the entire tilted handle
      const antDir3 = (s.leftAnat === 'post') ? -1 : 1;
      const hx3 = antDir3 * (rW * 0.5);
      const tiltAnt = 20 * Math.PI / 180;
      const tiltSup = 20 * Math.PI / 180;
      const hRadW2 = rW / 3; // handle half-width
      const hRadT2 = 3 / 2;  // handle half-thickness
      const hLen = 30;

      // Dome tip center
      const tipX = hx3 + antDir3 * hLen * Math.sin(tiltAnt);
      const tipY = resMax + hLen * Math.cos(tiltAnt) * Math.cos(tiltSup);
      const tipZ = hLen * Math.sin(tiltSup);

      // Two handle supports: one at dome tip, one at half handle height
      const halfLen = hLen / 2;
      const midX = hx3 + antDir3 * halfLen * Math.sin(tiltAnt);
      const midY = resMax + halfLen * Math.cos(tiltAnt) * Math.cos(tiltSup);
      const midZ = halfLen * Math.sin(tiltSup);
      const handleSupports = [
        { x: tipX + antDir3 * hRadW2, z: tipZ, y: tipY, dir: antDir3 },       // at dome tip
        { x: midX + antDir3 * hRadW2, z: midZ, y: midY, dir: antDir3 }        // at half height
      ];
      for (const hs of handleSupports) {
        const supTopY = hs.y;
        const pH = supTopY + liftH - cTipH;
        if (pH <= 1) continue;
        const hSupR = 0.35;
        const hpg = new THREE.CylinderGeometry(hSupR, hSupR, pH, 6);
        const hpm = new THREE.Mesh(hpg); hpm.position.set(hs.x, -liftH + pH/2, hs.z);
        hpm.updateMatrix(); hpg.applyMatrix4(hpm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(hpg, supportMaterial.clone()));

        const htg = new THREE.CylinderGeometry(cTipR, hSupR, cTipH, 6);
        const htm = new THREE.Mesh(htg);
        htm.position.set(hs.x - hs.dir * cTipH/2, -liftH + pH, hs.z);
        htm.rotation.z = hs.dir * Math.PI / 2;
        htm.updateMatrix(); htg.applyMatrix4(htm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(htg, supportMaterial.clone()));

        const hbg = new THREE.CylinderGeometry(supR*2, supR*2, 0.3, 6);
        const hbm = new THREE.Mesh(hbg); hbm.position.set(hs.x, -liftH + 0.15, hs.z);
        hbm.updateMatrix(); hbg.applyMatrix4(hbm.matrix);
        supportPreviewGroup.add(new THREE.Mesh(hbg, supportMaterial.clone()));
      }

      // ── Guide A supports: rings under the bottom face ──
      // Use same layout logic as buildDrillingGuide
      const sRa = rW + 10.15; // Guide A effective radius (lip)
      const sRb = rW;         // Guide B effective radius
      const sGap = 4;
      const sDistA = rW + sGap + sRa;
      const sDistB = rW + sGap + sRb;
      const sDistAB = sRa + sGap + sRb;
      let sCosAB = (sDistA * sDistA + sDistB * sDistB - sDistAB * sDistAB) / (2 * sDistA * sDistB);
      sCosAB = Math.max(-1, Math.min(1, sCosAB));
      const sAngBetween = Math.acos(sCosAB);
      const sAngCenter = Math.PI;
      const sAng1 = sAngCenter - sAngBetween / 2; // Guide A
      const sAng2 = sAngCenter + sAngBetween / 2; // Guide B
      const guideACX = sDistA * Math.cos(sAng1);
      const guideACZ = sDistA * Math.sin(sAng1);
      const rOuterLipA = rW + 0.15 + 10; // rInner + wallLip
      const rInnerA = rW + 0.15; // inner wall radius of Guide A
      // Raycast against Guide A mesh to find actual bottom Y at each support position
      const guideARay = new THREE.Raycaster();
      const guideAWasInScene = guideMesh && guideMesh.parent === scene;
      if (guideMesh && !guideAWasInScene) scene.add(guideMesh);
      if (guideMesh) guideMesh.updateMatrixWorld(true);

      const guideARings = [
        { r: rOuterLipA, n: 18, offset: 0, angled: true },                  // outermost ring (at lip edge)
        { r: rOuterLipA - 2, n: 16, offset: Math.PI / 16, angled: true },   // outer ring (lip inset)
        { r: (rOuterLipA + rInnerA) / 2, n: 10, offset: Math.PI / 10, angled: true }, // mid ring
        { r: rInnerA + (rOuterLipA - rInnerA) / 4, n: 12, offset: Math.PI / 12, angled: false } // inner ring
      ];
      const guideAPillars = []; // collect for bracing
      for (const ring of guideARings) {
        for (let i = 0; i < ring.n; i++) {
          const a = (i / ring.n) * Math.PI * 2 + ring.offset;
          const spx = guideACX + ring.r * Math.cos(a);
          const spz = guideACZ + ring.r * Math.sin(a);

          // Raycast upward from raft to find guide bottom surface + surface normal
          let topY = 0;
          let surfNorm = null;
          if (guideMesh) {
            guideARay.set(new THREE.Vector3(spx, -liftH, spz), new THREE.Vector3(0, 1, 0));
            const hits = guideARay.intersectObject(guideMesh, true);
            if (hits.length > 0) {
              topY = hits[0].point.y;
              if (ring.angled && hits[0].face) {
                // Transform face normal to world space using rotation only
                const n = hits[0].face.normal.clone();
                n.transformDirection(hits[0].object.matrixWorld);
                // Ensure normal points downward (away from guide body toward raft)
                if (n.y > 0) n.negate();
                surfNorm = n;
              }
            }
            else continue;
          }
          const contactGap = ring.angled ? 0.3 : 0; // small gap so tip doesn't penetrate
          const bpH = (topY + liftH) - cTipH - contactGap;
          if (bpH < 0.5) continue;

          // Vertical pillar
          const pillarTopY = -liftH + bpH;
          const apg = new THREE.CylinderGeometry(supR, supR, bpH, 6);
          const apm = new THREE.Mesh(apg); apm.position.set(spx, -liftH + bpH/2, spz);
          apm.updateMatrix(); apg.applyMatrix4(apm.matrix);
          supportPreviewGroup.add(new THREE.Mesh(apg, supportMaterial.clone()));

          // Contact tip: narrow end (cTipR) at +Y, wide end (supR) at -Y
          const atg = new THREE.CylinderGeometry(cTipR, supR, cTipH, 6);
          if (surfNorm && Math.abs(surfNorm.dot(upVec)) < 0.95) {
            // Tip axis = inward normal (into surface)
            const tipAxis = surfNorm.clone().negate(); // points up into guide surface
            const quat = new THREE.Quaternion().setFromUnitVectors(upVec, tipAxis);
            const rotMat = new THREE.Matrix4().makeRotationFromQuaternion(quat);
            atg.applyMatrix4(rotMat);
            // Wide base at pillar top: center = pillarTop + tipAxis * cTipH/2
            atg.applyMatrix4(new THREE.Matrix4().makeTranslation(
              spx + tipAxis.x * cTipH / 2,
              pillarTopY + tipAxis.y * cTipH / 2,
              spz + tipAxis.z * cTipH / 2
            ));
            supportPreviewGroup.add(new THREE.Mesh(atg, supportMaterial.clone()));

            // Sphere joint at pillar-tip junction to fill the gap smoothly
            const jointG = new THREE.SphereGeometry(supR, 8, 8);
            jointG.applyMatrix4(new THREE.Matrix4().makeTranslation(spx, pillarTopY, spz));
            supportPreviewGroup.add(new THREE.Mesh(jointG, supportMaterial.clone()));
          } else {
            // Vertical tip (inner ring or near-horizontal surface)
            const atm = new THREE.Mesh(atg);
            atm.position.set(spx, pillarTopY + cTipH/2, spz);
            atm.updateMatrix(); atg.applyMatrix4(atm.matrix);
            supportPreviewGroup.add(new THREE.Mesh(atg, supportMaterial.clone()));
          }

          // Base pad
          const abg = new THREE.CylinderGeometry(supR*2, supR*2, 0.3, 6);
          const abm = new THREE.Mesh(abg); abm.position.set(spx, -liftH + 0.15, spz);
          abm.updateMatrix(); abg.applyMatrix4(abm.matrix);
          supportPreviewGroup.add(new THREE.Mesh(abg, supportMaterial.clone()));

          // Record for bracing (outer 3 rings only)
          if (ring.angled) guideAPillars.push({ x: spx, z: spz, topY: pillarTopY });
        }
      }

      // ── Diagonal bracing between outer 3 rings of Guide A ──
      const braceAdded = new Set();
      const braceLevels = [0.2, 0.4, 0.6, 0.8];
      // Simple seeded random for consistent results
      let brSeed = 12345;
      function brRand() { brSeed = (brSeed * 16807 + 0) % 2147483647; return brSeed / 2147483647; }
      for (let pi = 0; pi < guideAPillars.length; pi++) {
        const p = guideAPillars[pi];
        const dists = [];
        for (let pj = 0; pj < guideAPillars.length; pj++) {
          if (pi === pj) continue;
          const q = guideAPillars[pj];
          const dx = p.x - q.x, dz = p.z - q.z;
          dists.push({ idx: pj, d: Math.sqrt(dx * dx + dz * dz) });
        }
        dists.sort((a, b) => a.d - b.d);
        let count = 0;
        for (const nb of dists) {
          if (count >= 4) break;
          const key = Math.min(pi, nb.idx) + '-' + Math.max(pi, nb.idx);
          if (braceAdded.has(key)) { count++; continue; }
          braceAdded.add(key);
          const q = guideAPillars[nb.idx];
          const dx = q.x - p.x, dz = q.z - p.z;
          const len = Math.sqrt(dx * dx + dz * dz);
          const angle = Math.atan2(dx, dz);
          // Diagonal braces: connect different height levels on each pillar
          for (let li = 0; li < braceLevels.length; li++) {
            const t1 = braceLevels[li];
            // Randomly offset the other end by ±1 level for diagonal
            const offset = brRand() > 0.5 ? 1 : -1;
            const li2 = Math.max(0, Math.min(braceLevels.length - 1, li + offset));
            const t2 = braceLevels[li2];
            const y1 = -liftH + (p.topY + liftH) * t1;
            const y2 = -liftH + (q.topY + liftH) * t2;
            if (y1 > p.topY || y2 > q.topY) continue;
            // 3D brace from (p.x, y1, p.z) to (q.x, y2, q.z)
            const dx = q.x - p.x, dy = y2 - y1, dz = q.z - p.z;
            const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
            const braceG = new THREE.CylinderGeometry(supR, supR, len, 6);
            // Align cylinder Y-axis with brace direction
            const dir = new THREE.Vector3(dx, dy, dz).normalize();
            const brQuat = new THREE.Quaternion().setFromUnitVectors(upVec, dir);
            braceG.applyMatrix4(new THREE.Matrix4().makeRotationFromQuaternion(brQuat));
            braceG.applyMatrix4(new THREE.Matrix4().makeTranslation(
              (p.x + q.x) / 2, (y1 + y2) / 2, (p.z + q.z) / 2
            ));
            supportPreviewGroup.add(new THREE.Mesh(braceG, supportMaterial.clone()));
          }
          count++;
        }
      }

      if (guideMesh && !guideAWasInScene) scene.remove(guideMesh);
      if (guideMesh) guideMesh.visible = guideAVisible;
      if (plugMeshRef) plugMeshRef.visible = guideBVisible;

      // ── Guide B supports: outer ring (14) + inner ring (7) under the bottom face ──
      const guideBCX = sDistB * Math.cos(sAng2);
      const guideBCZ = sDistB * Math.sin(sAng2);
      const guideBRings = [
        { r: rW - 2, n: 14, offset: 0 },            // outer ring
        { r: rW * 0.5, n: 7, offset: Math.PI / 7 }, // inner ring, rotated to stagger
        { r: 0, n: 1, offset: 0 }                    // center
      ];
      for (const ring of guideBRings) {
        for (let i = 0; i < ring.n; i++) {
          const a = (i / ring.n) * Math.PI * 2 + ring.offset;
          const spx = guideBCX + ring.r * Math.cos(a);
          const spz = guideBCZ + ring.r * Math.sin(a);
          const bpH = liftH - cTipH;
          if (bpH < 0.5) continue;

          const bpg = new THREE.CylinderGeometry(supR, supR, bpH, 6);
          const bpm = new THREE.Mesh(bpg); bpm.position.set(spx, -liftH + bpH/2, spz);
          bpm.updateMatrix(); bpg.applyMatrix4(bpm.matrix);
          supportPreviewGroup.add(new THREE.Mesh(bpg, supportMaterial.clone()));

          const btg = new THREE.CylinderGeometry(cTipR, supR, cTipH, 6);
          const btm = new THREE.Mesh(btg); btm.position.set(spx, -liftH + bpH + cTipH/2, spz);
          btm.updateMatrix(); btg.applyMatrix4(btm.matrix);
          supportPreviewGroup.add(new THREE.Mesh(btg, supportMaterial.clone()));

          const bbg = new THREE.CylinderGeometry(supR*2, supR*2, 0.3, 6);
          const bbm = new THREE.Mesh(bbg); bbm.position.set(spx, -liftH + 0.15, spz);
          bbm.updateMatrix(); bbg.applyMatrix4(bbm.matrix);
          supportPreviewGroup.add(new THREE.Mesh(bbg, supportMaterial.clone()));
        }
      }

      // ── Organic raft: 5mm offset from part circles + handle ──
      const raftPad = 5;
      // Define part circles (center + radius)
      const partCircles = [
        { cx: 0, cz: 0, r: rW },                         // wedge
        { cx: guideACX, cz: guideACZ, r: rOuterLipA },    // Guide A (lip)
        { cx: guideBCX, cz: guideBCZ, r: rW },            // Guide B
        { cx: handleSupports[0].x, cz: handleSupports[0].z, r: 2 },  // handle at tip
        { cx: handleSupports[1].x, cz: handleSupports[1].z, r: 2 }  // handle at mid
      ];

      // Distance from point to nearest circle edge
      function distToCircles(px, pz) {
        let minD = Infinity;
        for (const c of partCircles) {
          const d = Math.sqrt((px - c.cx) ** 2 + (pz - c.cz) ** 2) - c.r;
          if (d < minD) minD = d;
        }
        return minD;
      }

      // Centroid
      let cxAll = 0, czAll = 0;
      for (const c of partCircles) { cxAll += c.cx; czAll += c.cz; }
      cxAll /= partCircles.length; czAll /= partCircles.length;

      // March 360 angles, binary search for outline where dist = raftPad
      const outlineSegs = 360;
      const outlinePoints = [];
      for (let i = 0; i < outlineSegs; i++) {
        const ang = (i / outlineSegs) * Math.PI * 2;
        const dx = Math.cos(ang), dz = Math.sin(ang);
        let lo = 0, hi = 200;
        for (let iter = 0; iter < 25; iter++) {
          const mid = (lo + hi) / 2;
          const px = cxAll + dx * mid, pz = czAll + dz * mid;
          if (distToCircles(px, pz) < raftPad) lo = mid; else hi = mid;
        }
        const r = (lo + hi) / 2;
        outlinePoints.push({ x: cxAll + dx * r, z: czAll + dz * r });
      }

      // Smooth outline (3 passes)
      for (let pass = 0; pass < 3; pass++) {
        const sm = [];
        for (let i = 0; i < outlinePoints.length; i++) {
          const prev = outlinePoints[(i - 1 + outlineSegs) % outlineSegs];
          const curr = outlinePoints[i];
          const next = outlinePoints[(i + 1) % outlineSegs];
          sm.push({ x: (prev.x + curr.x + next.x) / 3, z: (prev.z + curr.z + next.z) / 3 });
        }
        for (let i = 0; i < outlineSegs; i++) outlinePoints[i] = sm[i];
      }

      // ── Floor: organic shape, 1.5mm thick, 45° chamfer on edge ──
      // Top surface at y = -liftH, outline at outlinePoints
      // Bottom surface at y = -liftH - raftH2
      // Floor edge expands by (wallT3 - chamfer) to meet the wall's bottom chamfer start
      const wallT3 = 1.5, chamfer = 1;
      const floorShrink = raftH2; // 1.5mm inward at top = true 45°
      const floorGeo = new THREE.BufferGeometry();
      const fV = [], fI = [];
      // v0: top center
      fV.push(cxAll, -liftH, czAll);
      // v1..N: top ring (shrunk inward by raftH2 for 45° chamfer)
      for (const p of outlinePoints) {
        const nx = p.x - cxAll, nz = p.z - czAll;
        const nLen = Math.sqrt(nx * nx + nz * nz);
        fV.push(p.x - (nx / nLen) * floorShrink, -liftH, p.z - (nz / nLen) * floorShrink);
      }
      // Top face
      for (let i = 0; i < outlineSegs; i++) fI.push(0, 1 + i, 1 + (i + 1) % outlineSegs);
      // v(N+1): bottom center
      const bc = 1 + outlineSegs;
      fV.push(cxAll, -liftH - raftH2, czAll);
      // v(N+2)..v(2N+1): bottom ring (at outline = full size)
      const be = bc + 1;
      for (const p of outlinePoints) fV.push(p.x, -liftH - raftH2, p.z);
      // Bottom face
      for (let i = 0; i < outlineSegs; i++) fI.push(bc, be + (i + 1) % outlineSegs, be + i);
      // 45° chamfer side (connects shrunk top ring to full-size bottom ring)
      for (let i = 0; i < outlineSegs; i++) {
        const n = (i + 1) % outlineSegs;
        fI.push(1 + i, be + i, be + n); fI.push(1 + i, be + n, 1 + n);
      }
      floorGeo.setAttribute('position', new THREE.Float32BufferAttribute(fV, 3));
      floorGeo.setIndex(fI);
      floorGeo.computeVertexNormals();
      supportPreviewGroup.add(new THREE.Mesh(floorGeo, supportMaterial.clone()));

      // ── Wall: follows outline, 3mm high, 1.5mm thick, 1mm chamfer on outer top edge ──
      const wallH3 = 3;
      const wallGeo = new THREE.BufferGeometry();
      const wV = [], wI = [];
      // 7 verts per segment: bottom chamfer, outer wall, top chamfer, inner top, inner bottom (with 45° slope inside)
      // Inner face slopes at 45° from bottom (at outline + wallH3 inward) to top (at outline)
      // This creates a triangular buttress on the inside
      const innerSlopeW = wallH3; // 45°: horizontal extent = wall height
      for (let i = 0; i < outlineSegs; i++) {
        const p = outlinePoints[i];
        const nx = p.x - cxAll, nz = p.z - czAll;
        const nLen = Math.sqrt(nx * nx + nz * nz);
        const ux = nx / nLen, uz = nz / nLen;
        const offX = ux * wallT3, offZ = uz * wallT3;
        const yBot = -liftH - raftH2;
        const yTop = yBot + wallH3;
        wV.push(p.x + offX - ux * chamfer, yBot, p.z + offZ - uz * chamfer);   // v0: bottom chamfer start (inset)
        wV.push(p.x + offX, yBot + chamfer, p.z + offZ);                        // v1: bottom chamfer end (outer)
        wV.push(p.x + offX, yTop - chamfer, p.z + offZ);                        // v2: top chamfer start (outer)
        wV.push(p.x + offX - ux * chamfer, yTop, p.z + offZ - uz * chamfer);   // v3: top chamfer end (inset)
        wV.push(p.x, yTop, p.z);                                                // v4: inner top (at outline)
        wV.push(p.x - ux * innerSlopeW, yBot, p.z - uz * innerSlopeW);         // v5: inner bottom (inward by wallH3)
      }
      // Compute cumulative perimeter for drain gaps
      let wallPerim = 0;
      const wallPerimAt = [0];
      for (let i = 0; i < outlineSegs; i++) {
        const pa = outlinePoints[i], pb = outlinePoints[(i + 1) % outlineSegs];
        wallPerim += Math.sqrt((pb.x - pa.x) ** 2 + (pb.z - pa.z) ** 2);
        wallPerimAt.push(wallPerim);
      }
      // Track which segments are solid vs gap
      const wallSolid = [];
      for (let i = 0; i < outlineSegs; i++) {
        wallSolid.push(wallPerimAt[i] % 8 <= 7);
      }
      for (let i = 0; i < outlineSegs; i++) {
        if (!wallSolid[i]) continue;
        const n = (i + 1) % outlineSegs;
        const a = i * 6, b = n * 6;
        // Bottom chamfer (v0→v1)
        wI.push(a, b, b + 1); wI.push(a, b + 1, a + 1);
        // Outer face (v1→v2)
        wI.push(a + 1, b + 1, b + 2); wI.push(a + 1, b + 2, a + 2);
        // Top chamfer (v2→v3)
        wI.push(a + 2, b + 2, b + 3); wI.push(a + 2, b + 3, a + 3);
        // Top face (v3→v4)
        wI.push(a + 3, b + 3, b + 4); wI.push(a + 3, b + 4, a + 4);
        // Inner 45° slope (v4→v5)
        wI.push(a + 4, a + 5, b + 5); wI.push(a + 4, b + 5, b + 4);
        // Bottom face (v5→v0)
        wI.push(a + 5, a, b); wI.push(a + 5, b, b + 5);

        // End cap at START of solid segment (facing backward into gap)
        const prev = (i - 1 + outlineSegs) % outlineSegs;
        if (!wallSolid[prev]) {
          // Cap at vertex ring 'i' — winding: v0,v1,v2,v3,v4,v5 (CW from outside = into gap)
          wI.push(a, a + 1, a + 4); wI.push(a + 1, a + 3, a + 4);
          wI.push(a + 1, a + 2, a + 3); wI.push(a, a + 4, a + 5);
        }
        // End cap at END of solid segment (facing forward into gap)
        if (!wallSolid[n]) {
          // Cap at vertex ring 'n' — opposite winding
          wI.push(b, b + 4, b + 1); wI.push(b + 1, b + 4, b + 3);
          wI.push(b + 1, b + 3, b + 2); wI.push(b, b + 5, b + 4);
        }
      }
      wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wV, 3));
      wallGeo.setIndex(wI);
      wallGeo.computeVertexNormals();
      supportPreviewGroup.add(new THREE.Mesh(wallGeo, supportMaterial.clone()));

      // Shift everything up so raft bottom = y=0
      const liftTotal = liftH + raftH2;
      if (wedgeMesh) wedgeMesh.position.y += liftTotal;
      if (wedgeEdges) wedgeEdges.position.y += liftTotal;
      if (guideMesh) guideMesh.position.y += liftTotal;
      if (plugMeshRef) plugMeshRef.position.y += liftTotal;
      for (const m of markers) m.position.y += liftTotal;
      if (slopeLine) slopeLine.position.y += liftTotal;
      if (slopeMaxMarker) slopeMaxMarker.position.y += liftTotal;
      if (slopeMinMarker) slopeMinMarker.position.y += liftTotal;
      supportPreviewGroup.position.y = liftTotal;

      scene.add(supportPreviewGroup);
    } catch(e) { console.error('Support error:', e); } });

    // Combined STL export: exports exactly what's shown in the 3D preview
    document.getElementById('download-all-stl').addEventListener('click', () => {
      const s = currentState || window.wedgeState;
      if (!s || !s.D) { alert('No model to export.'); return; }

      // Ensure all parts and supports are built
      if (!wedgeMesh) rebuild(s);
      const wasA = guideAVisible, wasB = guideBVisible;
      if (!guideMesh || !plugMeshRef) {
        guideAVisible = true; guideBVisible = true;
        buildDrillingGuide(s);
        guideAVisible = wasA; guideBVisible = wasB;
      }
      // Trigger supports if checked but not yet built
      if (document.getElementById('chk-supports').checked && !supportPreviewGroup) {
        document.getElementById('chk-supports').dispatchEvent(new Event('change'));
      }

      try {
        const exportScene = new THREE.Scene();

        // Collect all meshes, merge into single geometry
        const partsToExport = [];
        if (wedgeMesh) partsToExport.push(wedgeMesh);
        if (guideMesh) partsToExport.push(guideMesh);
        if (plugMeshRef) partsToExport.push(plugMeshRef);
        if (supportPreviewGroup) partsToExport.push(supportPreviewGroup);

        // Merge all into one geometry for clean STL
        const allPositions = [];
        const allNormals = [];
        for (const part of partsToExport) {
          part.updateMatrixWorld(true);
          part.traverse(child => {
            if (!child.isMesh || !child.geometry) return;
            const g = child.geometry.clone();
            // Convert indexed to non-indexed for merging
            const nonIndexed = g.index ? g.toNonIndexed() : g;
            nonIndexed.applyMatrix4(child.matrixWorld);
            nonIndexed.computeVertexNormals();
            const pos = nonIndexed.getAttribute('position');
            const norm = nonIndexed.getAttribute('normal');
            for (let i = 0; i < pos.count; i++) {
              allPositions.push(pos.getX(i), pos.getY(i), pos.getZ(i));
              if (norm) allNormals.push(norm.getX(i), norm.getY(i), norm.getZ(i));
              else allNormals.push(0, 1, 0);
            }
          });
        }

        // Rotate Y-up to Z-up for printer: swap Y↔Z, negate new Z for correct orientation
        // (x, y, z) → (x, -z, y)  i.e. rotate -90° around X
        const rotPositions = [];
        const rotNormals = [];
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity;
        for (let i = 0; i < allPositions.length; i += 3) {
          const x = allPositions[i], y = allPositions[i+1], z = allPositions[i+2];
          rotPositions.push(x, -z, y);
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (-z < minY) minY = -z; if (-z > maxY) maxY = -z;
          if (y < minZ) minZ = y;
        }
        // Shift so model center is at platform center, Z min = 0
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        for (let i = 0; i < rotPositions.length; i += 3) {
          rotPositions[i] -= cx;
          rotPositions[i + 1] -= cy;
          rotPositions[i + 2] -= minZ;
        }
        // PreForm centers on positive coordinates — no negative XY needed
        for (let i = 0; i < allNormals.length; i += 3) {
          rotNormals.push(allNormals[i], -allNormals[i+2], allNormals[i+1]);
        }
        const mergedGeo = new THREE.BufferGeometry();
        mergedGeo.setAttribute('position', new THREE.Float32BufferAttribute(rotPositions, 3));
        mergedGeo.setAttribute('normal', new THREE.Float32BufferAttribute(rotNormals, 3));
        exportScene.add(new THREE.Mesh(mergedGeo));

        // Export as binary STL (preferred by printers)
        const stlBuffer = stlExporter.parse(exportScene, { binary: true });
        const blob = new Blob([stlBuffer], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        const fileDate = new Date().toISOString().slice(2, 10); // YY-MM-DD
        const sideChar = (window.wedgeSide === 'left') ? 'L' : 'R';
        const stlPatId = (document.getElementById('pat-id') && document.getElementById('pat-id').value || '').trim();
        link.download = fileDate + '_wedge_guide_' + sideChar + '-' + (stlPatId || '') + '.stl';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 200);
      } catch (err) {
        console.error('STL export failed:', err);
        alert('Could not export STL. See console for details.');
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  } catch (err) {
    console.error('3D viewer failed to load:', err);
    const container = document.getElementById('three-container');
    if (container) {
      container.innerHTML = '<div class="viewer-fallback">3D view could not be loaded. The 2D diagram and table above remain available.</div>';
    }
    const stlBtn = document.getElementById('download-stl');
    if (stlBtn) stlBtn.style.display = 'none';
    const recenterBtn = document.getElementById('recenter-btn');
    if (recenterBtn) recenterBtn.style.display = 'none';
  }
</script>
